<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OpenKrakey · Inspector (design mock)</title>
  <meta name="description" content="STATIC DESIGN MOCK — the read-only inspector debug console re-skinned to the config-web cockpit aesthetic. Fake bus data, for visual review only." />
  <style>
/* ============================================================================
   OpenKrakey — Inspector debug console (design mock)

   Re-skin of public_plugin/inspector to the config-web "mission-control cockpit"
   aesthetic. The :root tokens, fonts, dot-grid+glow backdrop, scrollbars, and the
   .btn / .pill / .card / .dd / toggle vocabulary are ported VERBATIM from
   packages/config-web/static/styles.css so the two pages read as ONE product.

   Tasteful extensions beyond the config-web kit (a dense observability surface
   the cockpit kit doesn't cover): a LEFT SIDEBAR (brand + agent roster + status
   pill + mock-state dev controls — the exact shell config-web/chat use, so all
   three surfaces match), a 2×2 panel grid that collapses to full-screen single
   panels via main[data-view], sticky panel headers, dense monospace record rows,
   beat lanes with a gutter rail, a small segmented Readable⇄Raw control, and
   per-category event accents drawn ONLY from the existing palette (mint / amber /
   danger / muted + two derived tints).

   NOTE: the inspector now lives inside the unified Console (which carries the top
   nav-bar). So it mirrors the sibling Config + Chat surfaces with a LEFT sidebar
   instead of a top header — no double top bar when embedded.
   ============================================================================ */

@import url('https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap');

:root {
  --mint:        #2FD69C;
  --mint-bright: #5cffc4;
  --mint-deep:   #1c8f68;
  --mint-glow:   rgba(47, 214, 156, 0.16);

  --ink:    #070b0a;   /* page background  */
  --panel:  #0d1413;   /* card surface     */
  --panel2: #111a18;   /* nested surface   */
  --panel3: #16211e;   /* hover / active   */
  --line:   #1d2b27;   /* borders          */
  --line2:  #294039;   /* stronger border  */

  --text:   #dce8e3;   /* primary text     */
  --muted:  #7e948c;   /* secondary text   */
  --faint:  #54655f;   /* tertiary / hints */

  --danger: #ff6b6b;
  --amber:  #ffcb6b;

  /* derived event-category tints (kept within the cockpit palette) */
  --violet: #9d8cff;   /* tool dispatch — a single extra cool accent */
  --sky:    #6bd4ff;   /* gather / compose */

  /* per-panel accent spread (green → blue → violet → warm), one per panel.
     Prompts already rides the default --mint; these complete the set so all
     four panels read at a glance. Each has a deep variant for borders and a
     low-alpha glow, mirroring how --mint(-deep/-glow) is structured.        */
  --azure:      #4ea3f0;            /* Event stream — a live "stream" reads blue,
                                       clearly bluer than the Prompts cyan/mint  */
  --azure-deep: #2f6fab;            /* azure border variant                      */
  --azure-glow: rgba(78,163,240,0.14);

  /* Logs — a warm gold, deliberately pushed amber→GOLD (lower hue, higher
     saturation) so the header accent stays separable from the in-body
     warn-amber (--amber #ffcb6b) and never reads like a warning row.         */
  --gold:       #f4b53a;            /* Logs header accent (distinct from --amber)*/
  --gold-deep:  #9c6f17;            /* gold border variant                       */
  --gold-glow:  rgba(244,181,58,0.13);

  --mono: 'JetBrains Mono', ui-monospace, monospace;
  --sans: 'Hanken Grotesk', system-ui, sans-serif;

  --r-sm: 7px;
  --r:    11px;
  --r-lg: 16px;

  --shadow: 0 18px 50px -20px rgba(0,0,0,0.8);
}

* { box-sizing: border-box; margin: 0; padding: 0; }

html { scroll-behavior: smooth; }

body {
  font-family: var(--sans);
  background: var(--ink);
  color: var(--text);
  line-height: 1.55;
  -webkit-font-smoothing: antialiased;
  height: 100vh;
  overflow: hidden;
  /* layered atmosphere: dot grid + two mint glows (verbatim from config-web) */
  background-image:
    radial-gradient(circle at 14% 8%, var(--mint-glow), transparent 42%),
    radial-gradient(circle at 92% 96%, rgba(47,214,156,0.07), transparent 46%),
    radial-gradient(rgba(255,255,255,0.018) 1px, transparent 1px);
  background-size: auto, auto, 22px 22px;
  background-attachment: fixed;
}

::selection { background: var(--mint); color: var(--ink); }

/* ── Inline SVG icons (config-web .ic conventions) ─────────────────────────*/
.ic { width: 1.15em; height: 1.15em; flex: none; display: inline-block; vertical-align: -0.18em; }
/* brand mark — config-web's exact sizing/glow (24px stars, mint, drop-shadow) */
.brand-mark .ic { width: 24px; height: 24px; }
.brand-mark { color: var(--mint); display: grid; place-items: center; filter: drop-shadow(0 0 12px rgba(47,214,156,0.5)); }
.h-ic { color: var(--mint); display: inline-flex; vertical-align: -2px; }
.h-ic .ic { width: 15px; height: 15px; }

/* thin custom scrollbars (verbatim) */
::-webkit-scrollbar { width: 10px; height: 10px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--line2); border-radius: 20px; border: 3px solid var(--ink); }
::-webkit-scrollbar-thumb:hover { background: var(--mint-deep); }
* { scrollbar-width: thin; scrollbar-color: var(--line2) transparent; }

/* ── Buttons / pills (verbatim from config-web) ────────────────────────────*/
.btn {
  font-family: var(--sans); font-size: 13.5px; font-weight: 600;
  border-radius: var(--r-sm); padding: 9px 16px; cursor: pointer;
  border: 1px solid var(--line2); background: var(--panel2); color: var(--text);
  transition: all .15s ease; display: inline-flex; align-items: center; gap: 8px; white-space: nowrap;
}
.btn:hover { border-color: var(--mint-deep); background: var(--panel3); }
.btn.primary {
  background: var(--mint); color: var(--ink); border-color: var(--mint);
  box-shadow: 0 8px 24px -10px var(--mint);
}
.btn.primary:hover { background: var(--mint-bright); box-shadow: 0 10px 30px -8px var(--mint); }
.btn.ghost { background: none; border-color: transparent; color: var(--muted); }
.btn.ghost:hover { color: var(--text); background: var(--panel2); }
.btn .btn-ic { width: 15px; height: 15px; }

.pill {
  font-family: var(--mono); font-size: 11px; padding: 2px 9px; border-radius: 20px;
  background: var(--panel3); color: var(--muted); border: 1px solid var(--line);
}
.pill.mint { color: var(--mint); border-color: var(--mint-deep); background: rgba(47,214,156,0.08); }
.pill.warn { color: var(--amber); border-color: rgba(255,203,107,0.3); background: rgba(255,203,107,0.06); }
.pill.danger { color: var(--danger); border-color: rgba(255,107,107,0.3); background: rgba(255,107,107,0.06); }

/* ============================================================================
   APP SHELL  — LEFT SIDEBAR + main (mirrors config-web / chat exactly, so all
   three surfaces match and the inspector never doubles the Console's top nav-bar)
   ============================================================================ */
.app { display: grid; grid-template-columns: 264px 1fr; height: 100vh; }

.sidebar {
  border-right: 1px solid var(--line);
  background: linear-gradient(180deg, rgba(13,20,19,0.9), rgba(7,11,10,0.6));
  backdrop-filter: blur(6px);
  display: flex; flex-direction: column;
  padding: 26px 18px;
  min-height: 0;
}

/* brand block — REPLICATED PIXEL-FOR-PIXEL from config-web's .brand:
   24px stars mark (mint, glow) + "KRAKEY Inspector" mark + a pill-style tagline.
   The tagline picks up config's general .tag chip surface (panel3 bg, line2
   border, 20px radius, 4px 6px 4px 12px padding, inline-flex) so it renders as a
   small rounded bordered pill, exactly like config. */
.brand { display: flex; align-items: center; gap: 11px; padding: 0 6px 4px; }
.brand .mark {
  font-family: var(--mono); font-weight: 700; font-size: 16.5px; letter-spacing: 1px;
  color: var(--mint); white-space: nowrap;
  text-shadow: 0 0 22px rgba(47,214,156,0.4);
}
.brand .mark .b { color: var(--muted); font-weight: 500; }
.brand .tag {
  /* pill chip — same as config's general .tag picked up by .brand .tag */
  display: inline-flex; align-items: center; gap: 7px;
  font-family: var(--mono); font-size: 8px; letter-spacing: 1.5px; text-transform: uppercase;
  color: var(--faint); margin-top: 3px; white-space: nowrap;
  background: var(--panel3); border: 1px solid var(--line2); border-radius: 20px;
  padding: 4px 6px 4px 12px;
}

/* EMBEDDED mode — inside the unified Krakey Console iframe, the Console's top
   nav-bar already shows the single global "KRAKEY Console" brand, so the
   inspector hides its OWN brand block to avoid two stacked KRAKEY logos. The
   first sidebar section (the "Agents" roster label) then starts cleanly at the
   sidebar top: drop the brand and zero the roster-label's top padding so there's
   no awkward gap where the brand used to be. Standalone (no .embedded) is
   unchanged. (.embedded is set on <html> by app.js when window.self !== top.) */
.embedded .sidebar .brand { display: none; }
.embedded .sidebar { padding-top: 18px; }
.embedded .sidebar .roster-label { padding-top: 0; }

/* AGENTS label above the roster — config-web's .nav .label treatment */
.roster-label {
  font-family: var(--mono); font-size: 9.5px; letter-spacing: 2px; text-transform: uppercase;
  color: var(--faint); padding: 24px 12px 9px;
}

/* agent roster — chat-mock's roster on config-web's .nav button rhythm. Each row
   is an agent: a small mint-tinted avatar (with a live presence dot), the agent
   id, and a mono sub (plugins · interval · live). Selecting one inspects that
   agent's bus. */
.roster { display: flex; flex-direction: column; gap: 3px; overflow-y: auto; min-height: 0; }
.agent {
  display: flex; align-items: center; gap: 11px;
  width: 100%; text-align: left;
  font-family: var(--sans); font-size: 14px; font-weight: 500;
  color: var(--muted);
  background: none; border: 1px solid transparent; border-radius: var(--r-sm);
  padding: 9px 11px; cursor: pointer;
  transition: all .16s ease;
}
.agent:hover { background: var(--panel2); color: var(--text); }
.agent.sel {
  background: linear-gradient(90deg, var(--mint-glow), transparent);
  border-color: var(--line2);
  color: var(--text);
}
/* round mint-tinted avatar (config-web vocabulary) + floated live presence dot */
.agent .av {
  position: relative; width: 30px; height: 30px; flex: none;
  border-radius: 50%; background: rgba(47,214,156,0.14); border: 1px solid var(--line2);
  display: inline-flex; align-items: center; justify-content: center;
  color: var(--mint); font-family: var(--mono); font-weight: 600; font-size: 13px; text-transform: uppercase;
}
.agent .av .pres {
  position: absolute; right: -1px; bottom: -1px;
  width: 9px; height: 9px; border-radius: 50%;
  background: var(--mint); border: 2px solid var(--ink); box-shadow: 0 0 8px var(--mint);
}
.agent .at { flex: 1; min-width: 0; display: flex; flex-direction: column; }
.agent .at .an { display: block; max-width: 100%; font-weight: 600; font-size: 13.5px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.agent.sel .at .an { color: var(--text); }
.agent .at .as { display: block; max-width: 100%; font-family: var(--mono); font-size: 10.5px; color: var(--faint); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-top: 1px; }

/* status pill (live/idle/reconnecting heartbeat) — now in the sidebar, under the
   roster. Sits in a thin divider row so it reads as the bus-connection signal. */
.sb-status {
  margin-top: 14px; padding: 14px 6px 0; border-top: 1px solid var(--line);
  display: flex; align-items: center;
}
.status {
  font-family: var(--mono); font-size: 11.5px; color: var(--muted);
  padding: 6px 11px; background: var(--panel2); border: 1px solid var(--line);
  border-radius: 20px; display: inline-flex; align-items: center; gap: 7px; flex: none; white-space: nowrap;
}
.status .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--faint); }
.status.live { color: var(--mint); border-color: var(--mint-deep); background: rgba(47,214,156,0.08); }
.status.live .dot { background: var(--mint); box-shadow: 0 0 10px var(--mint); animation: pulse 1.8s ease-in-out infinite; }
.status.err { color: var(--amber); border-color: rgba(255,203,107,0.3); background: rgba(255,203,107,0.06); }
.status.err .dot { background: var(--amber); box-shadow: 0 0 10px var(--amber); }
@keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.35; } }

/* dev controls (mock-only — switch lock / landing / dashboard states). Lives in
   the sidebar FOOTER now (config/chat keep their mock note in .foot). Same amber
   "mock states" idiom, restacked vertically to fit the narrow sidebar. */
.sidebar .foot { margin-top: auto; padding: 14px 8px 0; border-top: 1px solid var(--line); }
.dev-strip {
  display: flex; flex-wrap: wrap; align-items: center; gap: 6px;
  font-family: var(--mono); font-size: 10.5px; color: var(--faint); letter-spacing: 0.4px;
}
.dev-strip .dl { width: 100%; text-transform: uppercase; letter-spacing: 1.4px; color: var(--amber); margin-bottom: 2px; }
.dev-strip button {
  font-family: var(--mono); font-size: 10.5px; color: var(--muted);
  background: var(--panel2); border: 1px solid var(--line); border-radius: 5px;
  padding: 3px 9px; cursor: pointer; transition: all .14s;
}
.dev-strip button:hover { color: var(--text); border-color: var(--line2); }
.dev-strip button.on { color: var(--mint); border-color: var(--mint-deep); background: rgba(47,214,156,0.08); }
.sidebar .foot .note { font-family: var(--mono); font-size: 10px; color: var(--faint); line-height: 1.7; margin-top: 12px; }
.sidebar .foot .note .d { color: var(--mint); }

/* ============================================================================
   SURFACE  — the right-hand grid cell: a full-height flex column that hosts the
   lock/landing screens and the dashboard panel grid (no top bar of its own).
   ============================================================================ */
.surface { display: flex; flex-direction: column; min-width: 0; height: 100vh; overflow: hidden; }

/* ============================================================================
   STATE SCREENS  — lock + landing
   ============================================================================ */
.screen { flex: 1; display: none; align-items: center; justify-content: center; padding: 32px; overflow: auto; }
.screen.show { display: flex; }

/* lock */
.lock-card {
  max-width: 460px; text-align: center;
  background: var(--panel); border: 1px solid var(--line); border-radius: var(--r-lg);
  padding: 40px 38px; box-shadow: var(--shadow);
}
.lock-card .lk-ic { color: var(--danger); display: inline-flex; filter: drop-shadow(0 0 14px rgba(255,107,107,0.4)); margin-bottom: 14px; }
.lock-card .lk-ic .ic { width: 34px; height: 34px; }
.lock-card h2 { font-size: 22px; font-weight: 800; letter-spacing: -0.4px; color: var(--text); }
.lock-card p { color: var(--muted); font-size: 14px; margin-top: 12px; }
.lock-card code {
  font-family: var(--mono); font-size: 12.5px; color: var(--mint);
  background: var(--ink); border: 1px solid var(--line2); border-radius: 5px; padding: 2px 7px;
}

/* landing */
.landing-card {
  max-width: 580px; width: 100%;
  background: var(--panel); border: 1px solid var(--line); border-radius: var(--r-lg);
  padding: 34px 36px; box-shadow: var(--shadow); animation: fade .35s ease;
}
.landing-card .lc-head { display: flex; align-items: center; gap: 13px; margin-bottom: 6px; }
.landing-card .lc-head .g { color: var(--mint); display: inline-flex; filter: drop-shadow(0 0 12px rgba(47,214,156,0.45)); }
.landing-card .lc-head .g .ic { width: 26px; height: 26px; }
.landing-card h2 { font-size: 22px; font-weight: 800; letter-spacing: -0.4px; }
.landing-card .lc-hint { color: var(--muted); font-size: 14px; margin: 4px 0 22px; }
.agent-list { display: flex; flex-direction: column; gap: 9px; }
.agent-card {
  display: flex; align-items: center; gap: 13px; padding: 14px 16px;
  background: var(--panel2); border: 1px solid var(--line); border-radius: var(--r);
  cursor: pointer; text-align: left; transition: all .15s ease; width: 100%;
}
.agent-card:hover { border-color: var(--line2); background: var(--panel3); transform: translateY(-1px); }
.agent-card .g { color: var(--mint); display: inline-flex; }
.agent-card .g .ic { width: 22px; height: 22px; }
.agent-card .ac-t { flex: 1; min-width: 0; }
.agent-card .ac-t .id { font-family: var(--mono); font-weight: 700; font-size: 15px; color: var(--text); }
.agent-card .ac-t .sub { font-family: var(--mono); font-size: 11.5px; color: var(--faint); margin-top: 3px; }
.agent-card .live-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--mint); box-shadow: 0 0 10px var(--mint); flex: none; }
.agent-card:hover .arrow { color: var(--mint); transform: translateX(3px); }
.agent-card .arrow { color: var(--faint); transition: transform .16s, color .16s; display: inline-flex; }
.agent-card .arrow .ic { width: 19px; height: 19px; }

/* ============================================================================
   DASHBOARD  — the 2×2 panel grid / full-screen single panel
   ============================================================================ */
.dash { flex: 1; min-height: 0; padding: 16px; display: none; gap: 16px; }
.dash.show { display: grid; }
.dash[data-view="overview"] { grid-template-columns: 1fr 1fr; grid-template-rows: 1fr 1fr; }
.dash:not([data-view="overview"]) { grid-template-columns: 1fr; grid-template-rows: 1fr; }
.dash:not([data-view="overview"]) .panel { display: none; }
.dash[data-view="prompts"] .panel--prompts,
.dash[data-view="events"]  .panel--events,
.dash[data-view="beats"]   .panel--beats,
.dash[data-view="logs"]    .panel--logs { display: flex; }
.main.view-enter { animation: viewIn .3s cubic-bezier(.2,.8,.2,1) both; }

/* cockpit card → observability panel (config-web .card surface + sticky header) */
.panel {
  background: var(--panel); border: 1px solid var(--line); border-radius: var(--r);
  display: flex; flex-direction: column; overflow: hidden; min-height: 0;
}
/* per-panel accent edge — a tasteful tint so each panel reads at a glance.
   Four-way harmonious spread: Prompts green → Events azure → Beats violet →
   Logs gold. Each carries a matching low-alpha glow ring. */
.panel--prompts { border-color: var(--mint-deep); }
.panel--events  { border-color: var(--azure-deep); box-shadow: 0 0 0 1px var(--azure-glow); }
.panel--beats   { border-color: rgba(157,140,255,0.35); }
.panel--logs    { border-color: var(--gold-deep); box-shadow: 0 0 0 1px var(--gold-glow); }

/* sticky panel header: icon + title + count pill + control */
.panel > header {
  flex: 0 0 auto; display: flex; align-items: center; gap: 10px;
  padding: 11px 15px; border-bottom: 1px solid var(--line);
  background: linear-gradient(180deg, var(--panel2), rgba(13,20,19,0.4));
}
.panel > header .g { color: var(--mint); display: inline-flex; }
.panel > header .g .ic { width: 18px; height: 18px; }
.panel--events > header .g { color: var(--azure); }
.panel--beats  > header .g { color: var(--violet); }
.panel--logs   > header .g { color: var(--gold); }
.panel > header h3 { font-size: 14.5px; font-weight: 700; letter-spacing: -0.2px; }
.panel > header .count {
  font-family: var(--mono); font-size: 11px; color: var(--mint);
  background: rgba(47,214,156,0.08); border: 1px solid var(--mint-deep);
  border-radius: 20px; padding: 1px 8px;
}
.panel--events > header .count { color: var(--azure); border-color: var(--azure-deep); background: var(--azure-glow); }
.panel--beats  > header .count { color: var(--violet); border-color: rgba(157,140,255,0.4); background: rgba(157,140,255,0.08); }
.panel--logs   > header .count { color: var(--gold); border-color: var(--gold-deep); background: var(--gold-glow); }
.panel > header .hc { margin-left: auto; display: inline-flex; align-items: center; gap: 8px; }

/* ── expand⇄return button (replaces the old tab bar + hover hint) ───────────
   ONE dedicated, ALWAYS-visible control as the LAST element in each header's
   right cluster. It carries no hover-gated affordance: nothing in the header
   shifts on hover. The header itself is NOT a click target anymore. A small
   left gap separates it from the panel's own controls (the Prompts seg, etc).
   It is ICON-ONLY in BOTH states — a clean fixed square — so there is no width
   change at all on the expand/collapse switch:
   · Overview grid  → Expand control: the maximize glyph.
   · Expanded view  → Return control: the SAME box, minimize glyph.
   Only the glyph + tooltip + aria-label flip; the box never resizes. */
.pexp {
  margin-left: 2px; flex: none;
  display: inline-flex; align-items: center; justify-content: center;
  background: var(--panel2); border: 1px solid var(--line2); border-radius: var(--r-sm);
  width: 30px; height: 28px; padding: 0;
  cursor: pointer; transition: border-color .15s ease, background .15s ease, color .15s ease;
}
.pexp:hover { border-color: var(--mint-deep); background: var(--panel3); color: var(--text); }
.pexp:focus-visible { outline: none; border-color: var(--mint); box-shadow: 0 0 0 3px var(--mint-glow); }
.pexp .pexp-ico { width: 15px; height: 15px; color: var(--mint); flex: none; }

.panel .body { flex: 1; overflow: auto; padding: 10px 12px; min-height: 0; }
.panel .empty { color: var(--faint); font-style: italic; font-family: var(--sans); font-size: 13px; padding: 14px 4px; }

/* segmented Readable ⇄ Raw control (extension built from the kit's surfaces) */
.seg { display: inline-flex; border: 1px solid var(--line2); border-radius: var(--r-sm); overflow: hidden; background: var(--ink); }
.seg button {
  font-family: var(--mono); font-size: 10.5px; letter-spacing: 0.3px;
  color: var(--muted); background: none; border: none; cursor: pointer;
  padding: 4px 11px; transition: all .14s;
}
.seg button:hover { color: var(--text); }
.seg button + button { border-left: 1px solid var(--line2); }
.seg button.active { background: var(--mint); color: var(--ink); font-weight: 700; }

/* toolbar (auto-follow / log filters) */
.toolbar {
  flex: 0 0 auto; display: flex; align-items: center; gap: 10px;
  padding: 8px 12px; border-bottom: 1px solid var(--line); background: var(--panel2);
}
.toolbar .chk { display: inline-flex; align-items: center; gap: 8px; cursor: pointer; user-select: none; }
.toolbar .chk .box {
  width: 17px; height: 17px; border: 1.5px solid var(--line2); border-radius: 5px; background: var(--ink);
  display: grid; place-items: center; color: transparent; transition: all .15s;
}
.toolbar .chk .box .ic { width: 12px; height: 12px; }
.toolbar .chk.on .box { background: var(--mint); border-color: var(--mint); color: var(--ink); box-shadow: 0 0 12px -2px var(--mint); }

@keyframes fade { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }
@keyframes viewIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: none; } }

/* ── agent-switch transition ───────────────────────────────────────────────
   When the agent dropdown (or a landing card) selects a DIFFERENT agent, the
   freshly-rendered panel bodies animate in with config-web's viewIn feel — a
   short slide-up + fade. The class is added ONLY in selectAgent() and removed
   on animationend, so it fires per agent switch and NOT on a minor re-render
   (filter / auto-follow toggle, which re-run the same render* functions). A
   tiny per-panel stagger (mirrors config-web's .stagger) makes the four panels
   cascade rather than snap in unison; in the expanded single-panel view only
   the one visible body animates, so it reads the same. */
.panel .body.agent-in { animation: viewIn .28s cubic-bezier(.2,.8,.2,1) both; }
.panel--prompts .body.agent-in { animation-delay: .00s; }
.panel--events  .body.agent-in { animation-delay: .05s; }
.panel--beats   .body.agent-in { animation-delay: .10s; }
.panel--logs    .body.agent-in { animation-delay: .15s; }
@media (prefers-reduced-motion: reduce) {
  .panel .body.agent-in { animation: none; }
}

/* ── responsive: stack the sidebar above the surface + the 2×2 grid ────────
   Mirrors config-web / chat's 920px collapse: the sidebar drops to a stacked
   block above the surface, the roster scrolls vertically, and the 2×2 panel grid
   flattens to a single column. */
@media (max-width: 920px) {
  body { height: auto; min-height: 100vh; overflow: auto; }
  .app { grid-template-columns: 1fr; height: auto; min-height: 100vh; }
  .sidebar { border-right: none; border-bottom: 1px solid var(--line); padding: 16px 16px 12px; }
  .roster { max-height: 34vh; }
  .surface { height: auto; min-height: 60vh; }
  .dash[data-view="overview"] { grid-template-columns: 1fr; grid-template-rows: none; overflow: auto; }
  .dash[data-view="overview"] .panel { min-height: 280px; }
}

  var msgs = req.messages;
  if (Array.isArray(msgs) && msgs.length) {
    var lines = [];
    for (var i = 0; i < msgs.length; i++) {
      var m = (msgs[i] && typeof msgs[i] === "object") ? msgs[i] : {};
      var head = m.role ? String(m.role) : "?";
      if (typeof m.name === "string" && m.name) head += " (" + m.name + ")";
      var body;
      if (typeof m.content === "string") body = m.content;
      else if (m.content == null) body = "";
      else body = JSON.stringify(m.content);
      var line = head + ": " + body;
      if (typeof m.toolCallId === "string") line += "  [toolCallId=" + m.toolCallId + "]";
      if (Array.isArray(m.toolCalls) && m.toolCalls.length) line += "\n    toolCalls: " + JSON.stringify(m.toolCalls);
      lines.push(line);
    }
    parts.push("— messages (" + msgs.length + ") —\n" + lines.join("\n"));
  }
  var tools = req.tools;
  if (Array.isArray(tools) && tools.length) {
    var names = [];
    for (var j = 0; j < tools.length; j++) { var t = tools[j]; names.push((t && typeof t.name === "string") ? t.name : "?"); }
    parts.push("— tools (" + tools.length + ") —\n" + names.join(", "));
  }
  var pp = [];
  if (typeof req.temperature === "number") pp.push("temperature=" + req.temperature);
  if (typeof req.maxTokens === "number") pp.push("maxTokens=" + req.maxTokens);
  if (typeof req.model === "string") pp.push("model=" + req.model);
  if (pp.length) parts.push("params: " + pp.join(" · "));
  return parts.join("\n\n");
}

/* ============================================================================
   FAKE BUS DATA — two agents, each a believable session of beats.
   Record shape mirrors the inspector's wire records exactly:
     { seq, at, kind, corrId?, payload }
   kinds:  agent.start · tick · gather · prompt.sent · prompt.received · input ·
           output · tool.result · log · conversation
   ============================================================================ */

// The assembled request that the real `llm.request.sent` carries under
// payload.data.request — system prompt blocks composed by priority, a messages
// array, a couple of tools, and params. This is the load-bearing shape the real
// Prompts panel must surface.
function assembledRequest(persona, userMsg, assistantTurns) {
  const systemBlocks = [
    "[persona · prio 10000]\nYou are Krakey, an autonomous agent running on a heartbeat. Be concise, candid, and act with intent. " + persona,
    "[system-prompt · prio 9000]\nThe current time is " + new Date().toISOString() + ". You wake every 30s; if there is nothing to do, return a short monologue and stop.",
    "[web.guidance · prio 500]\nWeb search is available via the `web_search` tool. Prefer primary sources. Cite URLs inline. Never fabricate a result you did not fetch.",
  ].join("\n\n");
  const messages = [{ role: "user", content: userMsg }];
  for (const t of (assistantTurns || [])) messages.push(t);
  return {
    model: "claude-sonnet-4-6",
    system: systemBlocks,
    messages,
    tools: [
      { name: "web_search", description: "Search the web and return ranked results." },
      { name: "fetch_url", description: "Fetch a URL and return readable text." },
    ],
    temperature: 0.7,
    maxTokens: 4096,
  };
}

/* ============================================================================
   STATE MACHINE over the fake records — mirrors page.script.ts applyRecord().
   ============================================================================ */
function freshState(id) {
  return { id, records: [], prompts: {}, promptOrder: [], beats: [], logs: [] };
}
const KIND_CLASS = {
  "agent.start": "k-start", "tick": "k-tick", "gather": "k-gather",
  "prompt.sent": "k-sent", "prompt.received": "k-recv", "input": "k-input",
  "output": "k-output", "tool.result": "k-tool", "conversation": "k-conv", "log": "k-log",
};
const KIND_ICON = {
  "agent.start": "stars", "tick": "tick", "gather": "layers", "prompt.sent": "send",
  "prompt.received": "receive", "input": "chat", "output": "chat", "tool.result": "wrench",
  "conversation": "journal", "log": "terminal",
};
function get(obj, path) { let cur = obj; for (const k of path) { if (cur == null || typeof cur !== "object") return undefined; cur = cur[k]; } return cur; }

function summarize(rec) {
  const p = rec.payload;
  switch (rec.kind) {
    case "prompt.sent": {
      const rq = get(p, ["data", "request"]);
      if (rq) { const mc = Array.isArray(rq.messages) ? rq.messages.length : 0; const tc = Array.isArray(rq.tools) ? rq.tools.length : 0; return "messages=" + mc + (tc ? (", tools=" + tc) : ""); }
      return "(context)";
    }
    case "prompt.received": {
      if (p && p.ok === false) return "error: " + (p.error || "?");
      const d = p && p.data; const calls = d && d.toolCalls ? d.toolCalls.length : 0; const clen = d && typeof d.content === "string" ? d.content.length : 0;
      return "content len=" + clen + (calls ? (", toolCalls=" + calls) : "");
    }
    case "input": return JSON.stringify(get(p, ["data", "text"]) || "");
    case "output": return JSON.stringify(get(p, ["data", "text"]) || "");
    case "tool.result": { const nm = p && p.name ? p.name : "?"; return nm + (p && p.ok === false ? " (error)" : " ok"); }
    case "log": return (get(p, ["data", "level"]) || "?") + " " + (get(p, ["data", "pluginId"]) || "?") + ": " + (get(p, ["data", "text"]) || "");
    case "tick": return "seq=" + get(p, ["data", "seq"]);
    case "gather": return "seq=" + get(p, ["data", "seq"]);
    case "agent.start": return get(p, ["data", "agentId"]) || "";
    case "conversation": { const m = get(p, ["data", "messages"]); return (Array.isArray(m) ? m.length : 0) + " turns"; }
    default: return "";
  }
}

function applyRecord(s, rec) {
  s.records.push(rec);
  if ((rec.kind === "prompt.sent" || rec.kind === "prompt.received") && rec.corrId) {
    if (!s.prompts[rec.corrId]) { s.prompts[rec.corrId] = {}; s.promptOrder.push(rec.corrId); }
    if (rec.kind === "prompt.sent") {
      // chooseSent: prefer the assembled request (payload.data.request) — mirrors page.format.ts
      const cur = s.prompts[rec.corrId].sent;
      if (!cur) s.prompts[rec.corrId].sent = rec;
      else if (get(rec.payload, ["data", "request"])) s.prompts[rec.corrId].sent = rec;
      else if (!get(cur.payload, ["data", "request"])) s.prompts[rec.corrId].sent = rec;
    } else s.prompts[rec.corrId].received = rec;
  }
  if (rec.kind === "log") s.logs.push(rec);
  if (rec.kind === "tick" || rec.kind === "gather") {
    s.beats.push({ seq: rec.seq, at: rec.at, label: rec.kind + " " + get(rec.payload, ["data", "seq"]), records: [rec] });
  } else {
    if (!s.beats.length) s.beats.push({ seq: rec.seq, at: rec.at, label: "pre-beat", records: [] });
    s.beats[s.beats.length - 1].records.push(rec);
  }
}

function renderEvents(s) {

// Readable view: render the assembled request as discrete blocks; raw view: JSON.
function renderRequestReadable(req) {
  if (!req) return '<div class="respmono">(no request captured)</div>';
  let html = '<div class="rdblock">';
  // system blocks — split the composed system string back into priority blocks
  if (typeof req.system === "string" && req.system) {
    html += '<div class="blk"><div class="blk-h">system prompt <span class="bn">· composed by priority</span></div>';
    const blocks = req.system.split("\n\n");
    for (const b of blocks) {
      const m = b.match(/^\[(.+?)\]\n?([\s\S]*)$/);
      if (m) html += `<div class="sysblk"><span class="prio">${esc(m[1])}</span>${esc(m[2].trim())}</div>`;
      else html += `<div class="sysblk">${esc(b)}</div>`;
    }
    html += '</div>';
  }
  // messages
  if (Array.isArray(req.messages) && req.messages.length) {
    html += `<div class="blk"><div class="blk-h">messages <span class="bn">· ${req.messages.length}</span></div>`;
    for (const m of req.messages) {
      const role = m.role || "?";
      let body = typeof m.content === "string" ? m.content : (m.content == null ? "" : JSON.stringify(m.content));
      let extra = "";
      if (m.toolCallId) extra += ` <span class="tcid">[toolCallId=${esc(m.toolCallId)}]</span>`;
      if (Array.isArray(m.toolCalls) && m.toolCalls.length) extra += ` <span class="tcid">→ calls ${esc(m.toolCalls.map((c) => c.name).join(", "))}</span>`;
      const nm = m.name ? ` (${esc(m.name)})` : "";
      html += `<div class="msg"><span class="role ${esc(role)}">${esc(role)}${nm}</span><span class="mc">${esc(body)}${extra}</span></div>`;
    }
    html += '</div>';
  }
  // tools
  if (Array.isArray(req.tools) && req.tools.length) {
    html += `<div class="blk"><div class="blk-h">tools <span class="bn">· ${req.tools.length}</span></div><div class="toolchips">`;
    html += req.tools.map((t) => `<span class="toolchip">${esc(t.name || "?")}</span>`).join("");
    html += '</div></div>';
  }
  // params
  const pp = [];
  if (typeof req.model === "number" || typeof req.model === "string") pp.push(["model", req.model]);
  if (typeof req.temperature === "number") pp.push(["temperature", req.temperature]);
  if (typeof req.maxTokens === "number") pp.push(["maxTokens", req.maxTokens]);
  if (pp.length) {
    html += '<div class="blk"><div class="blk-h">params</div><div class="params">';
    html += pp.map(([k, v]) => `<span><b>${esc(k)}</b> <span class="pv">${esc(v)}</span></span>`).join("");
    html += '</div></div>';
  }
  html += '</div>';
  return html;
}

function renderPrompts(s) {
  const body = $("#prompts"); body.innerHTML = "";
  if (!s.promptOrder.length) { body.innerHTML = '<div class="empty">No prompts yet.</div>'; return; }
  // Index corrId → beat number for a friendly correlation crumb.
  const beatOf = {};
  s.beats.forEach((b, i) => { for (const r of b.records) if (r.corrId) beatOf[r.corrId] = i; });

  for (const cid of s.promptOrder) {
    const pr = s.prompts[cid];
    let badge, bcls;
    if (!pr.received) { badge = "pending"; bcls = "pending"; }
    else if (pr.received.payload && pr.received.payload.ok === false) { badge = "error"; bcls = "err"; }
    else { badge = "ok"; bcls = "ok"; }

    const req = pr.sent ? get(pr.sent.payload, ["data", "request"]) : null;
    const div = el("div", "pair");
    let inner = `<div class="ph">corr <span class="corr">${esc(cid)}</span>` +
      (beatOf[cid] != null ? `<span class="beatno">· beat #${beatOf[cid]}</span>` : "") +
      `<span class="badge ${bcls}">${badge}</span></div>`;

    // request block — readable vs raw
    inner += '<div class="seclabel req">request</div>';
    if (promptView === "raw") {
      inner += `<pre>${esc(formatRequest(pr.sent ? pr.sent.payload : {}, "raw"))}</pre>`;
    } else {
      inner += renderRequestReadable(req);
    }

    // response block
    inner += '<div class="seclabel resp">response</div>';
    if (!pr.received) {
      inner += '<div class="respmono">(awaiting response…)</div>';
    } else {
      const rp = pr.received.payload;
      if (rp && rp.ok === false) {
        inner += `<div class="respmono" style="color:var(--danger)">error: ${esc(rp.error || "?")}</div>`;
      } else if (promptView === "raw") {
        const d = rp && rp.data;
        inner += `<pre>${esc(pretty({ content: d && d.content, toolCalls: d && d.toolCalls, stopReason: d && d.stopReason, usage: d && d.usage }))}</pre>`;
      } else {
        const d = rp && rp.data;
        let r = `<div class="respmono">`;
        if (d && d.content) r += `<div style="margin-bottom:8px">${esc(d.content)}</div>`;
        if (d && Array.isArray(d.toolCalls) && d.toolCalls.length) {
          r += `<div class="toolchips" style="margin-bottom:8px">` + d.toolCalls.map((c) => `<span class="toolchip">${esc(c.name)}()</span>`).join("") + `</div>`;
        }
        const meta = [];
        if (d && d.stopReason) meta.push(`<span class="mono-key">stop</span> ${esc(d.stopReason)}`);
        if (d && d.usage) meta.push(`<span class="mono-key">tokens</span> ${esc(d.usage.inputTokens)}→${esc(d.usage.outputTokens)}`);
        if (meta.length) r += `<div class="params">${meta.map((m) => `<span>${m}</span>`).join("")}</div>`;
        r += `</div>`;
        inner += r;
      }
    }
    div.innerHTML = inner;
    body.appendChild(div);
  }
}

function renderLogs(s) {
  const body = $("#logs"); if (!body) return;
  body.innerHTML = "";
  const lvl = currentLevel;
  const pidF = $("#logPid").value.trim().toLowerCase();
  let shown = 0;
  for (const rec of s.logs) {

    if (pidF && String(d.pluginId || "").toLowerCase().indexOf(pidF) === -1) continue;
    const isCore = String(d.pluginId || "").startsWith("core:");
    const row = el("div", "log lvl-" + esc(d.level || ""));
    row.innerHTML =
      `<span class="lvl ${esc(d.level || "")}">${esc(d.level || "?")}</span>` +
      `<span class="pid${isCore ? " core" : ""}">${esc(d.pluginId || "?")}</span>` +
      `<span class="txt">${esc(d.text || "")}</span>`;

  if (lf && lf.classList.contains("on")) body.scrollTop = body.scrollHeight;
}

// Map a record to a lifecycle stage label + class for the beat lane.
const STAGE = {
  "tick": ["heartbeat", "s-gather"], "gather": ["gather", "s-gather"],
  "prompt.sent": ["request →", "s-sent"], "prompt.received": ["← return", "s-recv"],
  "tool.result": ["tool", "s-tool"], "input": ["input", "s-gather"],
  "output": ["output", "s-output"], "conversation": ["conversation", "s-output"],
  "log": ["log", ""], "agent.start": ["start", "s-output"],
};
function renderBeats(s) {
  const body = $("#beats"); body.innerHTML = "";
  if (!s.beats.length) { body.innerHTML = '<div class="empty">No beats yet.</div>'; return; }
  for (const b of s.beats) {
    const div = el("div", "beat");
    const last = b.records[b.records.length - 1];
    const dur = last ? (last.at - b.at) : 0;
    let html = `<div class="bh"><span class="bdot"></span>beat — ${esc(b.label)} <span class="bmeta">· ${fmtTime(b.at)} · ${b.records.length} events</span>` +
      `<span class="bdur">⏱ <b>${dur}ms</b></span></div><div class="lane">`;
    for (const r of b.records) {
      const [label, scls] = STAGE[r.kind] || [r.kind, ""];
      const corr = r.corrId ? ` <span class="corr">· ${esc(r.corrId)}</span>` : "";
      const dt = r.at - b.at;
      html += `<div class="step ${scls}"><span class="stage">${esc(label)}</span><span class="sd">${esc(summarize(r))}${corr}</span><span class="t">+${dt}ms</span></div>`;
    }
    html += '</div>';
    div.innerHTML = html;
    body.appendChild(div);
  }
}

/* ============================================================================
   SHELL  — LEFT SIDEBAR (brand + agent roster + status + mock-state dev controls)
   and a full-width SURFACE (lock/landing screens + the dashboard grid). No top
   bar of its own: when embedded in the Console it shows only its own sidebar. No
   tab bar either — the Overview grid is home; each panel carries one dedicated
   expand⇄return button at the far right of its header (see wirePanelExpand).
   ============================================================================ */
let state = null;
let currentLevel = "";  // log level filter
let currentView = "overview";

function buildShell() {
  const root = el("div", "app");
  root.innerHTML = `
    <!-- LEFT SIDEBAR — brand + agent roster + status + mock-state dev controls.
         Mirrors config-web / chat so all three surfaces match; replaces the old
         top header so the inspector shows no double top bar inside the Console. -->
    <aside class="sidebar">
      <div class="brand">
        <span class="brand-mark">${icon("stars")}</span>
        <div>
          <div class="mark">KRAKEY <span class="b">Inspector</span></div>
          <div class="tag">ultimate autonomous agent</div>
        </div>
      </div>

      <div class="roster-label">Agents</div>
      <div class="roster" id="roster"></div>

      <div class="sb-status">
        <span class="status" id="status"><span class="dot"></span><span class="st-text">idle</span></span>
      </div>

      <div class="foot">
        <div class="dev-strip">
          <span class="dl">mock states</span>
          <button data-state="dashboard" class="on">Dashboard</button>
          <button data-state="landing">Landing</button>
          <button data-state="lock">Lock</button>
        </div>
        <p class="note"><span class="d">●</span> static design mock<br>fake bus data</p>
      </div>
    </aside>

    <!-- SURFACE — full-width, NO top bar: lock/landing screens + the 2×2 grid -->
    <div class="surface">
      <!-- LOCK screen -->
      <div class="screen" id="lock">
        <div class="lock-card">
          <span class="lk-ic">${icon("lock")}</span>
          <h2>Locked</h2>
          <p>A valid access token is required. Append <code>?token=…</code> to the URL — the inspector prints the full URL on startup.</p>
        </div>
      </div>

      <!-- LANDING screen -->
      <div class="screen" id="landing">
        <div class="landing-card">
          <div class="lc-head"><span class="g">${icon("robot")}</span><h2>Select an agent to inspect</h2></div>
          <p class="lc-hint">Choose which running Agent's bus to observe.</p>
          <div class="agent-list" id="agentList"></div>
        </div>
      </div>

      <!-- DASHBOARD: the four panels -->
      <main class="dash main" id="main" data-view="overview">
        <section class="panel panel--prompts" data-view="prompts">
          <header>
            <span class="g">${icon("send")}</span><h3>Prompts</h3><span class="count" id="cPrompts">0</span>
            <div class="hc">
              <div class="seg" id="pvToggle">
                <button data-pv="readable" class="active">Readable</button>
                <button data-pv="raw">Raw</button>
              </div>
              ${panelToggle()}
            </div>
          </header>
          <div class="body" id="prompts"><div class="empty">No prompts yet.</div></div>
        </section>

        <section class="panel panel--events" data-view="events">
          <header>
            <span class="g">${icon("activity")}</span><h3>Event stream</h3><span class="count" id="cEvents">0</span>
            <div class="hc">${panelToggle()}</div>
          </header>
          <div class="toolbar">
            <label class="chk on" id="autoFollow"><span class="box">${icon("check")}</span><span class="lbl">auto-follow</span></label>
          </div>
          <div class="body" id="events"><div class="empty">No events yet.</div></div>
        </section>

        <section class="panel panel--beats" data-view="beats">
          <header>
            <span class="g">${icon("layers")}</span><h3>Per-beat timeline</h3><span class="count" id="cBeats">0</span>
            <div class="hc">${panelToggle()}</div>
          </header>
          <div class="body" id="beats"><div class="empty">No beats yet.</div></div>
        </section>

        <section class="panel panel--logs" data-view="logs">
          <header>
            <span class="g">${icon("terminal")}</span><h3>Logs</h3><span class="count" id="cLogs">0</span>
            <div class="hc">${panelToggle()}</div>
          </header>
          <div class="toolbar">
            <label class="chk on" id="logFollow"><span class="box">${icon("check")}</span><span class="lbl">auto-follow</span></label>
            <div class="levelseg" id="logLevel">
              <button data-lvl="" class="active">all</button>
              <button data-lvl="info">info</button>
              <button data-lvl="warn">warn</button>
              <button data-lvl="error">error</button>
              <button data-lvl="print">print</button>
            </div>
            <span class="filter-ico">${icon("search")}</span>
            <input class="tin" id="logPid" placeholder="pluginId…" />
          </div>
          <div class="body" id="logs"><div class="empty">No logs yet.</div></div>
        </section>
      </main>
    </div>`;
  document.body.appendChild(root);

  wirePanelExpand();
  wireAgentRoster();
  wirePromptToggle();
  wireLogFilters();
  wireAutoFollow();
  wireLogFollow();
  wireDevStrip();
}

function setStatus(text, cls) {
  const s = $("#status");
  s.className = "status" + (cls ? " " + cls : "");
  $(".st-text", s).textContent = text;
}

function showScreen(which) {
  $("#lock").classList.toggle("show", which === "lock");
  $("#landing").classList.toggle("show", which === "landing");
  $("#main").classList.toggle("show", which === "dashboard");
  // leaving the dashboard collapses any expanded panel back to the grid
  if (which !== "dashboard") collapsePanels();
  // when locked there is no agent to inspect — dim the roster so it reads inert.
  const roster = $("#roster");
  if (roster) roster.style.opacity = which === "lock" ? "0.4" : "";
  if (which === "lock") setStatus("locked", "err");
  else if (which === "landing") setStatus("select an agent");
}

/* ── expand⇄return panels: pure CSS toggle via main[data-view] ─────────────
   Overview (2×2 grid) is the home view. Each panel carries ONE dedicated,
   always-visible button (`.pexp`) at the far right of its header. In the grid it
   is an Expand control; clicking it expands THAT panel to the full-screen
   single-panel layout the tabs used to drive. In the expanded view the SAME
   button becomes a Return control (minimize glyph, icon-only — tooltip + aria
   carry the meaning) that returns to the grid. The button stops propagation;
   the panel header is no longer a
   click target, so the panel's own controls (Readable⇄Raw seg, filters,
   auto-follow) are untouched.                                                  */

// Reflect the current view onto every panel's toggle button: Expand in the grid,
// Return when expanded. Swaps ONLY the icon, the tooltip, and the aria-label so the
// single icon-only button reads correctly in both states (no on-screen text).
function syncPanelToggles() {
  const expanded = currentView !== "overview";
  $$(".pexp").forEach((btn) => {
    const ico = $(".pexp-ico", btn);
    // ICON-ONLY in both states: only the glyph + tooltip + aria-label change.
    if (expanded) {
      btn.classList.add("is-return");
      btn.title = "Return to overview";
      btn.setAttribute("aria-label", "Return to overview");
      if (ico) ico.outerHTML = icon("minimize", "pexp-ico");
    } else {
      btn.classList.remove("is-return");
      btn.title = "Expand";
      btn.setAttribute("aria-label", "Expand panel");
      if (ico) ico.outerHTML = icon("expand", "pexp-ico");
    }
  });
}
function expandPanel(view) {
  currentView = view;
  const main = $("#main");
  main.setAttribute("data-view", view);
  main.classList.remove("view-enter"); void main.offsetWidth; main.classList.add("view-enter");
  syncPanelToggles();
  // pin auto-followed streams to the bottom once the expanded layout settles
  pinFollowed();
}
function collapsePanels() {
  currentView = "overview";
  const main = $("#main");
  if (!main) return;
  main.setAttribute("data-view", "overview");
  main.classList.remove("view-enter"); void main.offsetWidth; main.classList.add("view-enter");
  syncPanelToggles();
  pinFollowed();
}
// re-pin any auto-followed body to the bottom (event stream + logs)
function pinFollowed() {
  const ev = $("#events"); if (ev && $("#autoFollow").classList.contains("on")) ev.scrollTop = ev.scrollHeight;
  const lg = $("#logs"); if (lg && $("#logFollow").classList.contains("on")) lg.scrollTop = lg.scrollHeight;
}
function wirePanelExpand() {
  $$(".panel").forEach((panel) => {
    const view = panel.getAttribute("data-view");
    const btn = $(".pexp", panel);
    if (!btn) return;
    // The dedicated button is the ONLY trigger. stopPropagation keeps it from
    // disturbing the panel's other controls. In the grid it expands this panel;
    // when already expanded it returns to the grid.
    btn.addEventListener("click", (e) => {
      e.stopPropagation();
      if ($("#main").getAttribute("data-view") === "overview") expandPanel(view);
      else collapsePanels();
    });
  });
  syncPanelToggles();
}

/* ── agent roster (sidebar, chat-mock vocabulary) ──────────────────────────
   Replaces the header dropdown with a sidebar list — one row per agent: a small
   mint avatar (initial + live presence dot), the agent id, and a mono sub line
   (plugins · interval · live). Selecting a row inspects that agent's bus.
   reflectRoster(curId) just moves the .sel highlight (used after selectAgent). */
function wireAgentRoster() {
  const roster = $("#roster");
  const ids = Object.keys(AGENTS);
  roster.innerHTML = ids.map((id) => {
    const a = AGENTS[id];
    return `<button class="agent" type="button" data-id="${esc(id)}" title="${esc(id)} — ${esc(a.sub)}">` +
      `<span class="av">${esc(id.slice(0, 1))}<span class="pres"></span></span>` +
      `<span class="at"><span class="an" title="${esc(id)}">${esc(id)}</span>` +
      `<span class="as" title="${esc(a.sub)}">${esc(a.sub)}</span></span></button>`;
  }).join("");
  $$(".agent", roster).forEach((row) => {
    row.onclick = () => selectAgent(row.getAttribute("data-id"));
  });
}

// Move the .sel highlight onto the row for `curId` (called from selectAgent).
function reflectRoster(curId) {
  $$("#roster .agent").forEach((row) => row.classList.toggle("sel", row.getAttribute("data-id") === curId));
}

/* ── prompt readable/raw toggle (actually switches) ────────────────────────*/
function wirePromptToggle() {
  const seg = $("#pvToggle");
  seg.addEventListener("click", (e) => {
    const btn = e.target.closest("button"); if (!btn) return;
    const pv = btn.getAttribute("data-pv");
    if (!pv || pv === promptView) return;
    promptView = pv;
    $$("button", seg).forEach((b) => b.classList.toggle("active", b.getAttribute("data-pv") === pv));
    if (state) renderPrompts(state);
  });
}

/* ── log filters (actually filter) ─────────────────────────────────────────*/
function wireLogFilters() {
  const seg = $("#logLevel");
  seg.addEventListener("click", (e) => {
    const btn = e.target.closest("button"); if (!btn) return;
    currentLevel = btn.getAttribute("data-lvl");
    $$("button", seg).forEach((b) => b.classList.toggle("active", b === btn));
    if (state) renderLogs(state);
  });
  $("#logPid").addEventListener("input", () => { if (state) renderLogs(state); });
}

/* ── auto-follow (actually pins to bottom) ─────────────────────────────────*/
function wireAutoFollow() {
  const chk = $("#autoFollow");
  chk.addEventListener("click", () => {
    chk.classList.toggle("on");
    if (chk.classList.contains("on")) { const b = $("#events"); b.scrollTop = b.scrollHeight; }
  });
  // manual scroll up unchecks it (mirrors the real page behavior)
  $("#events").addEventListener("scroll", function () {
    const b = $("#events");
    const atBottom = (b.scrollHeight - b.scrollTop - b.clientHeight) < 24;
    if (!atBottom && chk.classList.contains("on")) chk.classList.remove("on");
  });
}

/* ── logs auto-follow (pins the Logs panel to bottom, like the event stream) ─*/
function wireLogFollow() {
  const chk = $("#logFollow");
  chk.addEventListener("click", () => {
    chk.classList.toggle("on");
    if (chk.classList.contains("on")) { const b = $("#logs"); b.scrollTop = b.scrollHeight; }
  });
  // manual scroll up unchecks it (same behavior as the event-stream follow)
  $("#logs").addEventListener("scroll", function () {
    const b = $("#logs");
    const atBottom = (b.scrollHeight - b.scrollTop - b.clientHeight) < 24;
    if (!atBottom && chk.classList.contains("on")) chk.classList.remove("on");
  });
}

/* ── dev strip (mock-only state previews) ──────────────────────────────────*/
function wireDevStrip() {
  $$(".dev-strip button").forEach((btn) => {
    btn.addEventListener("click", () => {
      $$(".dev-strip button").forEach((b) => b.classList.remove("on"));
      btn.classList.add("on");
      showScreen(btn.getAttribute("data-state"));
    });
  });
}

/* ── landing list ──────────────────────────────────────────────────────────*/
function renderAgentList() {
  const list = $("#agentList"); list.innerHTML = "";
  for (const id of Object.keys(AGENTS)) {
    const a = AGENTS[id];
    const card = el("button", "agent-card");
    card.innerHTML =
      `<span class="g">${icon("robot")}</span>` +
      `<span class="ac-t"><span class="id">${esc(id)}</span><span class="sub">${esc(a.sub)}</span></span>` +
      `<span class="live-dot"></span><span class="arrow">${icon("arrowRight")}</span>`;
    card.onclick = () => {
      $$(".dev-strip button").forEach((b) => b.classList.toggle("on", b.getAttribute("data-state") === "dashboard"));
      selectAgent(id);
    };
    list.appendChild(card);
  }
}

/* ── agent-switch transition ───────────────────────────────────────────────
   Re-trigger the slide-up + fade on each panel body. Called ONLY from
   selectAgent (an actual agent switch) — never from the render* functions, so a
   filter or auto-follow toggle (which re-render in place) does NOT animate.
   Removing then forcing reflow before re-adding the class restarts the CSS
   animation cleanly on every switch, in both the 2×2 overview and the expanded
   single-panel view (the hidden panels just don't paint).                     */
function animateAgentSwitch() {
  const bodies = $$(".panel .body");
  bodies.forEach((b) => {
    b.classList.remove("agent-in");
    void b.offsetWidth;              // force reflow so the animation restarts
    b.classList.add("agent-in");
  });
  // Drop the class once the longest panel (logs · 0.15s delay + 0.28s) settles.
  // A timer is used (not animationend) so the class is reliably cleared even for
  // panels hidden in the expanded view, where the animationend never composites.
  clearTimeout(animateAgentSwitch._t);
  animateAgentSwitch._t = setTimeout(() => {
    bodies.forEach((b) => b.classList.remove("agent-in"));
  }, 500);
}

/* ── select an agent → ingest its fake records → render all panels ─────────*/
function selectAgent(id) {
  const a = AGENTS[id];
  if (!a) return;
  state = freshState(id);
  for (const rec of a.records) applyRecord(state, rec);
  reflectRoster(id);
  renderEvents(state);
  renderPrompts(state);
  renderLogs(state);
  renderBeats(state);
  renderCounts(state);
  setStatus("live", "live");
  showScreen("dashboard");
  animateAgentSwitch();
}

/* ── boot ──────────────────────────────────────────────────────────────────*/
function boot() {
  // Embedded mode: when this surface runs inside the unified Krakey Console
  // iframe, the Console already shows one global "KRAKEY Console" brand in its
  // top nav-bar, so the inspector must NOT show its own brand (two KRAKEY logos
  // would stack). `window.self !== window.top` is true inside any iframe and
  // works cross-origin. Standalone (top-level) keeps the brand exactly as-is.
  let embedded = false;
  try { embedded = window.self !== window.top; } catch (_) { embedded = true; }
  if (embedded) document.documentElement.classList.add("embedded");

  buildShell();
  renderAgentList();
  // ?state= preview hook (lock / landing) — defaults to the rich dashboard
  const qs = new URLSearchParams(location.search);
  const want = qs.get("state");
  if (want === "lock") { showScreen("lock"); $$(".dev-strip button").forEach((b) => b.classList.toggle("on", b.getAttribute("data-state") === "lock")); }
  else if (want === "landing") { showScreen("landing"); $$(".dev-strip button").forEach((b) => b.classList.toggle("on", b.getAttribute("data-state") === "landing")); }
  else { selectAgent(qs.get("agent") && AGENTS[qs.get("agent")] ? qs.get("agent") : "krakey"); }
}

boot();
})();

</script>
