name: Bug report
description: Report a defect in the runtime, a kernel module, or a bundled plugin.
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for filing a bug. Please do **not** report security issues here — see
        [SECURITY.md](../blob/main/SECURITY.md).
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the bug, and what you expected instead.
      placeholder: The Agent failed to compose context when…
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: Minimal steps. Include the relevant Agent config and plugin list if applicable.
      placeholder: |
        1. Configure an Agent with plugins […]
        2. Run `npm start`
        3. Send "…" in the web chat
        4. See error
    validations:
      required: true
  - type: input
    id: scope
    attributes:
      label: Affected area
      description: Which module or plugin? (e.g. orchestrator, web, krakeycode)
      placeholder: orchestrator
    validations:
      required: false
  - type: textarea
    id: env
    attributes:
      label: Environment
      description: OS, Node version (`node -v`), and the commit/branch you are on.
      placeholder: |
        - OS: Windows 11
        - Node: v20.11.0
        - Commit: abc1234
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs / output
      description: Relevant console output or the inspector panel. Redact any secrets.
      render: shell
    validations:
      required: false
