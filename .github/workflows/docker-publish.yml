# Build the Docker image and publish it to GitHub Packages (GHCR).
#
# Fires when a version tag is pushed (git tag v0.1.1 && git push --tags), and can
# be run by hand from the Actions tab (pick a tag ref to cut an image for an
# existing release, e.g. the already-pushed v0.1.0).
#
# Images land at ghcr.io/<owner>/openkrakey. Pull with:
#   docker pull ghcr.io/arrosam/openkrakey:latest
name: Publish Docker image

on:
  push:
    tags: ["v*.*.*"]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write # required to push to GHCR with the built-in GITHUB_TOKEN
    steps:
      - uses: actions/checkout@v4

      # GHCR image names must be lowercase; the repo owner ("Arrosam") isn't.
      - name: Compute lowercase image name
        run: echo "IMAGE=${REGISTRY}/${GITHUB_REPOSITORY,,}" >> "$GITHUB_ENV"

      # QEMU + Buildx enable the multi-arch (amd64 + arm64) build below.
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Derive tags & labels
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}
          # latest=auto (the default flavor) also tags :latest for a non-prerelease
          # semver tag, so v0.1.0 publishes 0.1.0, 0.1, latest, and a short-sha tag.
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=edge,enable={{is_default_branch}}
            type=sha,format=short

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false # keep the multi-arch package listing clean (no unknown/unknown entry)
