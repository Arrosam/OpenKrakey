# OpenKrakey — local run via Docker Compose.
#
#   docker compose up --build          # the CONSOLE DASHBOARD (landing page for setup) —
#                                       # watch the terminal for its tokened
#                                       # http://127.0.0.1:7716/?token=… URL
#   docker compose --profile run up     # the agent runtime, once a provider + agent exist
#
# Config + agent state live under ./config and ./agents on the host (bind-mounted), so
# they survive container restarts. The setup wizard creates them for you on first save.
services:
  # Default service: the unified Console dashboard — one page framing Config (the setup
  # wizard), Chat and Inspector. This is what `docker compose up` starts, because a fresh
  # install has no agents yet and the dashboard is Krakey's landing page.
  krakey:
    # Pulls the published image by default; `docker compose up --build` builds locally.
    image: ghcr.io/arrosam/openkrakey:latest
    build: .
    volumes:
      - ./config:/app/config
      - ./agents:/app/agents
    ports:
      - "127.0.0.1:7716:7716" # Console dashboard (the landing page) — host loopback only
      - "127.0.0.1:7717:7717" # config-web (framed by the Console for setup)
    # (uses the image's default CMD: the Console dashboard entrypoint)

  # The agent runtime — start it AFTER you've configured a provider + agent in the
  # setup UI above:  docker compose --profile run up
  runtime:
    image: ghcr.io/arrosam/openkrakey:latest
    build: .
    profiles: ["run"]
    command: ["node", "--import", "tsx", "packages/boot/src/index.ts"]
    volumes:
      - ./config:/app/config
      - ./agents:/app/agents
    ports:
      - "127.0.0.1:7718:7718" # web-chat  (set "host":"0.0.0.0" in the agent config)
      - "127.0.0.1:7719:7719" # inspector (set "host":"0.0.0.0" in the agent config)
    restart: unless-stopped
