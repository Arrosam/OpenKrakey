# OpenKrakey — local run via Docker Compose.
#
# First-time setup (create config/ + agents/ before `up`):
#   1. cp config/llm.example.json config/llm.json   # then add your provider + API key
#   2. Create agents/<id>/config.json (copy config/agent.default.example.json as a
#      starting point). To reach the Chat/Inspector surfaces from the host, set
#      "web-chat".host and "inspector".host to "0.0.0.0" in that agent config.
#
# Then:  docker compose up --build          # boots the agent runtime (default)
#        docker compose --profile setup run --rm --service-ports config   # config web UI
services:
  krakey:
    # Pulls the published image by default (`docker compose pull`). To build from
    # this checkout instead, run `docker compose up --build` (uses the Dockerfile
    # here and tags it as the image below).
    image: ghcr.io/arrosam/openkrakey:latest
    build: .
    # The runtime writes per-agent state under agents/ and config/agent.default.json;
    # bind-mount both so config + memory survive container restarts.
    volumes:
      - ./config:/app/config
      - ./agents:/app/agents
    ports:
      - "7718:7718" # web-chat  (Chat surface — needs host 0.0.0.0 in the agent config)
      - "7719:7719" # inspector (Inspector surface — needs host 0.0.0.0 in the agent config)
    # `npm start` (from the image) boots agents and stays in the foreground.
    restart: unless-stopped

  # Optional: the browser config UI, for editing settings without the arrow-key TUI.
  # Run on demand:  docker compose --profile setup run --rm --service-ports config
  config:
    image: ghcr.io/arrosam/openkrakey:latest
    build: .
    profiles: ["setup"]
    command: ["npm", "run", "config:web"]
    environment:
      CONFIG_WEB_HOST: "0.0.0.0"
    volumes:
      - ./config:/app/config
      - ./agents:/app/agents
    ports:
      - "7717:7717" # config-web
