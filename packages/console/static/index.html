<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OpenKrakey · Krakey Console</title>
  <meta name="description" content="The unified Krakey Console: a persistent top nav-bar + a Dashboard landing that switches between the three services (Config, Chat, Inspector), each embedded by URL." />
  <!--__SURFACES__-->
  <style>
/* ============================================================================
   OpenKrakey — Krakey Console

   The UNIFIED SHELL: one persistent TOP nav-bar + a Dashboard landing that
   switches the main area between the three product surfaces — Config, Chat,
   Inspector. All three load their LIVE apps inside an <iframe> by URL: the URLs
   come from window.__SURFACES__ (injected by the server from env), never
   hardcoded — so the same shell points at whatever ports the surfaces run on.

   The nav is a horizontal TOP bar (brand · tabs · status) so an embedded
   surface's own left sidebar is the ONLY sidebar on screen — no double-sidebar.
   The content (Dashboard home OR a surface iframe) fills the full width below it.

   The :root tokens, fonts, dot-grid + mint-glow backdrop, scrollbars, nav-tab
   styling, and the .btn / .pill / .card vocabulary are ported VERBATIM from
   packages/config-web/static/styles.css so all four pages read as ONE product.
   The icon() helper + ICONS map are likewise carried over verbatim.
   ============================================================================ */

@import url('https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap');

/* ── Tokens — VERBATIM from config-web ─────────────────────────────────────*/
:root {
  --mint:        #2FD69C;
  --mint-bright: #5cffc4;
  --mint-deep:   #1c8f68;
  --mint-glow:   rgba(47, 214, 156, 0.16);

  --ink:    #070b0a;   /* page background  */
  --panel:  #0d1413;   /* card surface     */
  --panel2: #111a18;   /* nested surface   */
  --panel3: #16211e;   /* hover / active   */
  --line:   #1d2b27;   /* borders          */
  --line2:  #294039;   /* stronger border  */

  --text:   #dce8e3;   /* primary text     */
  --muted:  #7e948c;   /* secondary text   */
  --faint:  #54655f;   /* tertiary / hints */

  --danger: #ff6b6b;
  --amber:  #ffcb6b;

  --mono: 'JetBrains Mono', ui-monospace, monospace;
  --sans: 'Hanken Grotesk', system-ui, sans-serif;

  --r-sm: 7px;
  --r:    11px;
  --r-lg: 16px;

  --shadow: 0 18px 50px -20px rgba(0,0,0,0.8);
}

* { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }

body {
  font-family: var(--sans);
  background: var(--ink);
  color: var(--text);
  line-height: 1.55;
  -webkit-font-smoothing: antialiased;
  min-height: 100vh;
  /* layered atmosphere: dot grid + two mint glows — VERBATIM */
  background-image:
    radial-gradient(circle at 14% 8%, var(--mint-glow), transparent 42%),
    radial-gradient(circle at 92% 96%, rgba(47,214,156,0.07), transparent 46%),
    radial-gradient(rgba(255,255,255,0.018) 1px, transparent 1px);
  background-size: auto, auto, 22px 22px;
  background-attachment: fixed;
}
::selection { background: var(--mint); color: var(--ink); }

/* ── Inline SVG icons — VERBATIM sizing scheme from config-web ──────────────*/
.ic { width: 1.15em; height: 1.15em; flex: none; display: inline-block; vertical-align: -0.18em; }
.nav .ico .ic { width: 17px; height: 17px; }
.card .ch .g .ic { width: 21px; height: 21px; }
.brand-mark .ic { width: 24px; height: 24px; }
.arrow { display: inline-flex; align-items: center; }
.arrow .ic { width: 19px; height: 19px; }
.btn .btn-ic { width: 15px; height: 15px; }
.brand-mark { color: var(--mint); display: grid; place-items: center; filter: drop-shadow(0 0 12px rgba(47,214,156,0.5)); }

/* thin custom scrollbars — VERBATIM */
::-webkit-scrollbar { width: 10px; height: 10px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--line2); border-radius: 20px; border: 3px solid var(--ink); }
::-webkit-scrollbar-thumb:hover { background: var(--mint-deep); }

/* ── App shell — vertical stack: TOP nav-bar row, then full-width content ───*/
.app { display: flex; flex-direction: column; min-height: 100vh; }

/* ── Top nav-bar — horizontal: brand · tabs · status ───────────────────────
   The bar has NO left padding: the brand occupies a FIXED 264px left column
   (= the embedded surfaces' `grid-template-columns: 264px 1fr` sidebar width)
   with its OWN right border, so that border lands exactly at x=264 and forms
   ONE continuous vertical line with each surface's sidebar right border.
   The remaining items (tabs · status) get the usual horizontal padding via a
   right-side gap/padding so they sit clear of the divider. */
.topnav {
  position: sticky; top: 0; z-index: 20;
  display: flex; align-items: center; gap: 22px;
  border-bottom: 1px solid var(--line);
  background: linear-gradient(180deg, rgba(13,20,19,0.92), rgba(7,11,10,0.72));
  backdrop-filter: blur(8px);
  padding: 12px 22px 12px 0;   /* no LEFT padding — brand column owns x=0..264 */
}

/* brand block — a FIXED 264px left column that mirrors the surface sidebar:
   same width, same horizontal padding (18px, from config-web's .sidebar), and
   a right border in --line that aligns pixel-for-pixel with the surface
   sidebar's right border at x=264. */
.brand {
  display: flex; align-items: center; gap: 11px; flex: none;
  width: 264px; box-sizing: border-box;
  padding: 0 18px;            /* matches surface .sidebar horizontal padding */
  align-self: stretch;        /* fill the bar height so the border is full-height */
  border-right: 1px solid var(--line);  /* the continuous vertical line at x=264 */
}
.brand .mark {
  font-family: var(--mono); font-weight: 700; font-size: 16px; letter-spacing: 1px;
  color: var(--mint); white-space: nowrap;
  text-shadow: 0 0 22px rgba(47,214,156,0.4);
}
.brand .mark .b { color: var(--muted); font-weight: 500; }
/* tagline rendered as a small ROUNDED BORDERED PILL — matches config-ui-mock's
   .brand .tag exactly (config's general .tag chip styling + the brand overrides):
   inline-flex pill on var(--panel3) / var(--line2), 20px radius, mono ~8px faint. */
.brand .tag {
  display: inline-flex; align-items: center;
  background: var(--panel3); border: 1px solid var(--line2); border-radius: 20px;
  padding: 4px 6px 4px 12px;
  font-family: var(--mono); font-size: 8px; letter-spacing: 1.5px; text-transform: uppercase;
  color: var(--faint); margin-top: 2px; white-space: nowrap;
}

/* (The brand column's own right border is the divider between brand and tabs —
   it aligns with each surface sidebar's right border at x=264. No separate
   .divide span is needed; the nav simply begins to the RIGHT of x=264.) */

/* nav — horizontal tabs (cockpit nav styling, laid out in a row) */
.nav { display: flex; flex-direction: row; align-items: center; gap: 4px; flex: 1 1 auto; min-width: 0; overflow-x: auto; scrollbar-width: thin; }
.nav button {
  display: inline-flex; align-items: center; gap: 9px;
  text-align: left; white-space: nowrap;
  font-family: var(--sans); font-size: 14px; font-weight: 500;
  color: var(--muted);
  background: none; border: 1px solid transparent; border-radius: var(--r-sm);
  padding: 9px 14px; cursor: pointer;
  transition: all .16s ease;
}
.nav button .ico { display: inline-flex; align-items: center; justify-content: center; color: var(--faint); transition: color .16s; }
.nav button:hover { background: var(--panel2); color: var(--text); }
.nav button:hover .ico { color: var(--mint); }
.nav button.active {
  background: linear-gradient(180deg, var(--mint-glow), transparent);
  border-color: var(--line2);
  color: var(--text);
}
.nav button.active .ico { color: var(--mint); text-shadow: 0 0 12px var(--mint); }
.nav button .count {
  font-family: var(--mono); font-size: 11px;
  color: var(--faint); background: var(--panel3); border-radius: 20px; padding: 1px 8px;
}

/* global status — condensed for the top bar's right side */
.topnav .foot { flex: none; display: flex; align-items: center; gap: 16px; padding-left: 4px; }
.topnav .foot .status { display: flex; align-items: center; gap: 8px; font-family: var(--mono); font-size: 11px; color: var(--muted); white-space: nowrap; }
.topnav .foot .status .dot {
  width: 8px; height: 8px; border-radius: 50%; flex: none;
  background: var(--faint); box-shadow: none;
  transition: background .2s, box-shadow .2s;
}
.topnav .foot .status .dot.up { background: var(--mint); box-shadow: 0 0 10px var(--mint); animation: pulse 2.4s ease-in-out infinite; }
.topnav .foot .status .dot.partial { background: var(--amber); box-shadow: 0 0 10px var(--amber); animation: pulse 2.4s ease-in-out infinite; }
.topnav .foot .status .dot.down { background: var(--faint); box-shadow: none; }
@keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.45; } }

/* ── Main column — full width, below the top nav-bar ───────────────────────*/
.main {
  display: flex; flex-direction: column; flex: 1; min-height: 0; min-width: 0; width: 100%;
}
/* DASHBOARD content gets the config-web padding; surface views go full-bleed. */
.main.is-dashboard { padding: 40px 48px 80px; overflow-y: auto; }
.main.is-surface   { padding: 0; }

/* topbar — VERBATIM */
.topbar { display: flex; align-items: flex-end; justify-content: space-between; margin-bottom: 30px; gap: 24px; }
.crumb { font-family: var(--mono); font-size: 11px; letter-spacing: 1px; color: var(--faint); text-transform: uppercase; margin-bottom: 9px; }
.crumb .sep { color: var(--line2); margin: 0 7px; }
.crumb b { color: var(--mint); font-weight: 500; }
h1.title { font-size: 30px; font-weight: 800; letter-spacing: -0.6px; line-height: 1.1; }
.title .accent { color: var(--mint); }
.subtitle { color: var(--muted); font-size: 14.5px; margin-top: 8px; max-width: 60ch; }

/* ── Buttons — VERBATIM ────────────────────────────────────────────────────*/
.btn {
  font-family: var(--sans); font-size: 13.5px; font-weight: 600;
  border-radius: var(--r-sm); padding: 9px 16px; cursor: pointer;
  border: 1px solid var(--line2); background: var(--panel2); color: var(--text);
  transition: all .15s ease; display: inline-flex; align-items: center; gap: 8px; white-space: nowrap;
  text-decoration: none;
}
.btn:hover { border-color: var(--mint-deep); background: var(--panel3); }
.btn.primary {
  background: var(--mint); color: var(--ink); border-color: var(--mint);
  box-shadow: 0 8px 24px -10px var(--mint);
}
.btn.primary:hover { background: var(--mint-bright); box-shadow: 0 10px 30px -8px var(--mint); }
.btn.ghost { background: none; border-color: transparent; color: var(--muted); }
.btn.ghost:hover { color: var(--text); background: var(--panel2); }

/* ── Cards / pills — VERBATIM base ─────────────────────────────────────────*/
.grid { display: grid; gap: 16px; }
.grid.cols-3 { grid-template-columns: repeat(3, 1fr); }

.card {
  background: var(--panel); border: 1px solid var(--line); border-radius: var(--r);
  padding: 22px; transition: border-color .16s, transform .16s;
}
.card.click { cursor: pointer; }
.card.click:hover { border-color: var(--line2); transform: translateY(-2px); }
.card .ch { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; }
.card .ch .g { color: var(--mint); display: inline-flex; align-items: center; }
.card .ch h3 { font-size: 16px; font-weight: 700; }
.card .ch .arrow { margin-left: auto; color: var(--faint); transition: transform .16s, color .16s; }
.card.click:hover .ch .arrow { color: var(--mint); transform: translateX(3px); }
.card p.desc { color: var(--muted); font-size: 13.5px; min-height: 38px; }
.card .meta { font-family: var(--mono); font-size: 11.5px; color: var(--faint); margin-top: 14px; display: flex; flex-wrap: wrap; gap: 6px; }

.pill {
  font-family: var(--mono); font-size: 11px; padding: 2px 9px; border-radius: 20px;
  background: var(--panel3); color: var(--muted); border: 1px solid var(--line);
}
.pill.mint { color: var(--mint); border-color: var(--mint-deep); background: rgba(47,214,156,0.08); }
.pill.warn { color: var(--amber); border-color: rgba(255,203,107,0.3); background: rgba(255,203,107,0.06); }

/* group label — VERBATIM */
.group-label { font-family: var(--mono); font-size: 10.5px; letter-spacing: 1.6px; text-transform: uppercase; color: var(--faint); margin: 30px 0 12px; display: flex; align-items: center; gap: 12px; }
.group-label::after { content: ""; flex: 1; height: 1px; background: var(--line); }

/* ── Dashboard hero ────────────────────────────────────────────────────────*/
.hero {
  position: relative; overflow: hidden;
  display: flex; gap: 30px; align-items: stretch;
  background: var(--panel); border: 1px solid var(--line); border-radius: var(--r-lg);
  padding: 36px 38px; margin-bottom: 6px; box-shadow: var(--shadow);
}
.hero .he-left { flex: 1 1 auto; min-width: 0; position: relative; }
.hero::after {
  content: ""; position: absolute; inset: 0; pointer-events: none;
  background: radial-gradient(circle at 88% 18%, var(--mint-glow), transparent 55%);
}
.hero .he-mark {
  display: inline-flex; align-items: center; gap: 11px;
  font-family: var(--mono); color: var(--mint); font-size: 18px; font-weight: 700; letter-spacing: 1px;
  text-shadow: 0 0 26px rgba(47,214,156,0.4); margin-bottom: 18px;
}
.hero .he-mark .ic { width: 24px; height: 24px; filter: drop-shadow(0 0 10px rgba(47,214,156,0.6)); }
.hero h1 { font-size: 34px; font-weight: 800; letter-spacing: -0.8px; line-height: 1.08; }
.hero h1 .accent { color: var(--mint); }
.hero .lede { color: var(--muted); font-size: 15px; margin-top: 12px; max-width: 64ch; }
.hero .he-strip { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 22px; position: relative; }
.he-stat { display: flex; align-items: center; gap: 9px; background: var(--panel2); border: 1px solid var(--line); border-radius: var(--r-sm); padding: 9px 14px; }
.he-stat .g { color: var(--mint); display: inline-flex; }
.he-stat .g .ic { width: 16px; height: 16px; }
.he-stat .n { font-family: var(--mono); font-size: 15px; font-weight: 700; color: var(--text); }
.he-stat .l { font-size: 12px; color: var(--muted); }

/* Hero call-to-action — ONE huge button filling the hero's right column. The
   whole thing is the button: a big "Quick setup" label + a couple of explainer
   lines, on a LIVING mint gradient that slowly flows (the "transition color"). */
.hero .he-cta-btn {
  flex: 0 0 38%; min-width: 300px; align-self: stretch;
  display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 12px; text-align: center;
  border: 1px solid var(--mint-bright); border-radius: var(--r-lg);
  cursor: pointer; color: var(--ink); padding: 34px 30px; font-family: var(--sans);
  /* the transition color: a diagonal mint gradient that drifts back and forth */
  background: linear-gradient(120deg, var(--mint-deep) 0%, var(--mint) 32%, var(--mint-bright) 50%, var(--mint) 68%, var(--mint-deep) 100%);
  background-size: 220% 220%;
  animation: ctaFlow 7s ease-in-out infinite;
  box-shadow: 0 20px 56px -18px rgba(47,214,156,0.55);
  transition: transform .2s ease, box-shadow .2s ease, filter .2s ease;
}
.hero .he-cta-btn:hover { transform: translateY(-3px); box-shadow: 0 26px 66px -14px rgba(47,214,156,0.72); filter: brightness(1.06) saturate(1.05); }
.hero .he-cta-btn:active { transform: translateY(-1px); }
.hero .he-cta-btn:focus-visible { outline: 2px solid var(--mint-bright); outline-offset: 3px; }
.hero .he-cta-btn .lab { display: inline-flex; align-items: center; gap: 12px; font-size: 27px; font-weight: 800; letter-spacing: -0.4px; }
.hero .he-cta-btn .lab .ic { width: 27px; height: 27px; }
.hero .he-cta-btn .sub { font-size: 14px; font-weight: 600; max-width: 30ch; color: rgba(7,11,10,0.80); }
.hero .he-cta-btn .tiny { font-family: var(--mono); font-size: 11px; letter-spacing: .5px; color: rgba(7,11,10,0.62); }
@keyframes ctaFlow { 0%, 100% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } }
@media (prefers-reduced-motion: reduce) { .hero .he-cta-btn { animation: none; } }

/* ── Surface cards (the three big openers) ─────────────────────────────────*/
.surface-card { display: flex; flex-direction: column; }
.surface-card .ch .open { margin-left: auto; }
.surface-card .open-row { margin-top: 16px; display: flex; align-items: center; gap: 8px; color: var(--mint); font-weight: 600; font-size: 13px; transition: gap .16s ease; }
.surface-card .open-row .ic { width: 16px; height: 16px; }
.surface-card.click:hover .open-row { gap: 12px; }

/* ── Recent activity list ──────────────────────────────────────────────────*/
.activity { display: grid; gap: 8px; }
.act-row {
  display: flex; align-items: center; gap: 13px;
  background: var(--panel); border: 1px solid var(--line); border-radius: var(--r-sm);
  padding: 12px 16px;
}
.act-row .g { color: var(--mint); width: 22px; display: inline-flex; align-items: center; justify-content: center; flex: none; }
.act-row .g .ic { width: 18px; height: 18px; }
.act-row .at { flex: 1; min-width: 0; font-size: 13.5px; }
.act-row .at b { font-weight: 600; }
.act-row .at .src { font-family: var(--mono); font-size: 11px; color: var(--faint); }
.act-row .when { font-family: var(--mono); font-size: 11px; color: var(--faint); flex: none; }

/* ── Surface viewport (iframe host) ────────────────────────────────────────
   The iframe sits DIRECTLY below the top nav-bar and fills the full remaining
   height + width — no breadcrumb sub-header. */
.surface { display: none; flex: 1; min-height: 0; flex-direction: column; }
.surface.active { display: flex; }

.surf-frame {
  flex: 1; width: 100%; border: 0; min-height: 0; display: block;
  background: var(--ink);
}

/* ── "Not connected" panel — shown in place of an unreachable surface ───────
   Same cockpit vocabulary as the dashboard cards: a centered, bordered slate
   panel with a Bootstrap `wifi-off` icon in a muted disc, the surface name, a short
   message and a Retry button. Replaces the dead iframe entirely. */
.disco {
  flex: 1; min-height: 0; width: 100%;
  display: flex; align-items: center; justify-content: center; padding: 40px;
}
.disco .box {
  max-width: 440px; width: 100%; text-align: center;
  background: var(--panel); border: 1px solid var(--line); border-radius: var(--r-lg);
  padding: 38px 34px; box-shadow: var(--shadow);
}
.disco .disc {
  width: 58px; height: 58px; border-radius: 50%; margin: 0 auto 20px;
  display: grid; place-items: center;
  background: var(--panel3); border: 1px solid var(--line2); color: var(--muted);
}
.disco .disc .ic { width: 26px; height: 26px; }
.disco h3 { font-size: 19px; font-weight: 800; letter-spacing: -0.3px; margin-bottom: 8px; }
.disco h3 .nm { color: var(--text); }
.disco p { color: var(--muted); font-size: 14px; max-width: 38ch; margin: 0 auto 22px; }
.disco p code {
  font-family: var(--mono); font-size: 12.5px; color: var(--mint);
  background: rgba(47,214,156,0.08); border: 1px solid var(--mint-deep);
  border-radius: var(--r-sm); padding: 1px 7px;
}
.disco .actions { display: flex; align-items: center; justify-content: center; gap: 10px; }
.disco .btn.retrying { opacity: 0.7; pointer-events: none; }
.disco .btn .spin { animation: spin 0.9s linear infinite; transform-origin: 50% 50%; }
@keyframes spin { to { transform: rotate(360deg); } }

/* ── Per-surface status dot — on the dashboard cards + the nav ──────────────
   mint (lit) = reachable · slate (offline) = not connected · faint pulse while
   the probe is in flight. */
.sdot {
  width: 9px; height: 9px; border-radius: 50%; flex: none; display: inline-block;
  background: var(--faint); border: 1px solid var(--line2);
  transition: background .2s, box-shadow .2s, border-color .2s;
}
.sdot.up { background: var(--mint); border-color: var(--mint); box-shadow: 0 0 10px var(--mint); }
.sdot.down { background: var(--faint); border-color: var(--line2); box-shadow: none; }
.sdot.probing { animation: pulse 1.2s ease-in-out infinite; }
/* status label beside the dot on a card */
.card .ch .st { margin-left: auto; display: inline-flex; align-items: center; gap: 7px; font-family: var(--mono); font-size: 10px; letter-spacing: 0.6px; text-transform: uppercase; color: var(--faint); }
.card .ch .st.up { color: var(--mint); }
.surface-card .ch .arrow.open { display: none; } /* status replaces the arrow on surface cards */

@keyframes viewIn { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: none; } }
.view-enter { animation: viewIn .34s cubic-bezier(.2,.8,.2,1) both; }
.stagger > * { opacity: 0; animation: fade .5s ease forwards; }
.stagger > *:nth-child(1){animation-delay:.04s}
.stagger > *:nth-child(2){animation-delay:.10s}
.stagger > *:nth-child(3){animation-delay:.16s}
.stagger > *:nth-child(4){animation-delay:.22s}
.stagger > *:nth-child(5){animation-delay:.28s}
.stagger > *:nth-child(6){animation-delay:.34s}
@keyframes fade { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }

/* ── Responsive — the top nav-bar stays a TOP bar (never a left column) ─────
   On narrow widths the tabs scroll horizontally; the verbose status line and
   brand tagline drop out so the bar stays single-row and compact. Below 920px
   the embedded surfaces collapse their 264px sidebar into a horizontal row, so
   the fixed 264px brand column + its x=264 divider no longer have anything to
   line up with — the brand relaxes back to a compact, auto-width block. */
@media (max-width: 920px) {
  .topnav { gap: 14px; padding: 10px 16px; }
  .brand {
    width: auto; padding: 0; border-right: 0; align-self: center;
  }
  .brand .tag { display: none; }
  .main.is-dashboard { padding: 28px 22px 70px; }
  .grid.cols-3 { grid-template-columns: 1fr; }
  .hero { flex-direction: column; gap: 22px; }
  .hero .he-cta-btn { flex-basis: auto; min-height: 190px; }
}
@media (max-width: 620px) {
  .topnav .foot .status { display: none; }
}
  </style>
</head>
<body>
  <!-- The whole shell (top nav-bar, dashboard, surface viewports) is built by
       the inline script below, mirroring the sibling-mock convention (JS owns
       the shell) and reusing config-web's icon() helper + ICONS map verbatim.
       The iframe srcs come from window.__SURFACES__ (injected by the server). -->
  <script>
  (() => {
    /* ── DOM helpers (carried from config-web/app.js) ─────────────────────*/
    const el = (tag, cls, html) => { const n = document.createElement(tag); if (cls) n.className = cls; if (html != null) n.innerHTML = html; return n; };
    const $ = (sel, root = document) => root.querySelector(sel);

    /* ── Surface URLs — injected by the server from env ───────────────────
       window.__SURFACES__ = { config, chat, inspector } — absolute URLs of the
       three live apps. If the script is missing (shouldn't happen when served
       by the console server) we fall back to the conventional loopback ports so
       the shell is still usable. */
    const URLS = Object.assign(
      { config: "http://127.0.0.1:7700", chat: "http://127.0.0.1:7717", inspector: "http://127.0.0.1:7788" },
      (window.__SURFACES__ || {}),
    );

    /* ── Inline SVG icon set — VERBATIM from config-web/app.js (+ a couple
          drawn in the same line-icon style for activity rows) ─────────────*/
    const ICONS = {
      grid: `<rect x="3" y="3" width="7" height="7" rx="1.5"/><rect x="14" y="3" width="7" height="7" rx="1.5"/><rect x="3" y="14" width="7" height="7" rx="1.5"/><rect x="14" y="14" width="7" height="7" rx="1.5"/>`,
      stars: `<path d="M12 3c.4 3.6 1.4 4.6 5 5-3.6.4-4.6 1.4-5 5-.4-3.6-1.4-4.6-5-5 3.6-.4 4.6-1.4 5-5z"/><path d="M18.5 13.5c.2 1.7.6 2.1 2 2.3-1.4.2-1.8.6-2 2.3-.2-1.7-.6-2.1-2-2.3 1.4-.2 1.8-.6 2-2.3z"/>`,
      sliders: `<line x1="4" y1="7" x2="20" y2="7"/><line x1="4" y1="12" x2="20" y2="12"/><line x1="4" y1="17" x2="20" y2="17"/><circle cx="9" cy="7" r="2.4" fill="var(--panel)"/><circle cx="15" cy="12" r="2.4" fill="var(--panel)"/><circle cx="11" cy="17" r="2.4" fill="var(--panel)"/>`,
      chat: `<path d="M20.5 12a8 8 0 0 1-11.6 7.1L4 20.5l1.4-4.9A8 8 0 1 1 20.5 12z"/><path d="M8.5 12h.01M12 12h.01M15.5 12h.01"/>`,
      activity: `<path d="M3 12h3.5l2.5-7 4.5 14 2.5-7H21"/>`,
      server: `<rect x="3" y="4" width="18" height="7" rx="1.6"/><rect x="3" y="13" width="18" height="7" rx="1.6"/><path d="M6.5 7.5h2.5M6.5 16.5h2.5"/><path d="M16.8 7.5h.01M16.8 16.5h.01"/>`,
      robot: `<rect x="4" y="8" width="16" height="12" rx="2.5"/><path d="M12 8V4.6"/><circle cx="12" cy="3.4" r="1.2"/><circle cx="9.2" cy="13.5" r="1.3"/><circle cx="14.8" cy="13.5" r="1.3"/><path d="M9.5 17h5"/><path d="M2 12.5v3M22 12.5v3"/>`,
      cpu: `<rect x="6.5" y="6.5" width="11" height="11" rx="1.6"/><rect x="9.6" y="9.6" width="4.8" height="4.8" rx="0.6"/><path d="M9.5 3v3M14.5 3v3M9.5 18v3M14.5 18v3M3 9.5h3M3 14.5h3M18 9.5h3M18 14.5h3"/>`,
      arrowRight: `<path d="M4 12h15M13 6l6 6-6 6"/>`,
      check: `<path d="M5 12.5l4.5 4.5L19 7"/>`,
      person: `<circle cx="12" cy="8" r="3.6"/><path d="M5.5 19.5c.6-3.4 3.3-5.5 6.5-5.5s5.9 2.1 6.5 5.5"/>`,
      // a circular refresh arrow for the Retry button + probing spinner
      refresh: `<path d="M21 12a9 9 0 1 1-2.6-6.4"/><path d="M21 4v5h-5"/>`,
    };
    function icon(name, cls) {
      const p = ICONS[name];
      if (!p) return "";
      return `<svg class="ic${cls ? " " + cls : ""}" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">${p}</svg>`;
    }

    // "Not connected" mark — Bootstrap Icons `wifi-off` (v1.11.3), embedded inline
    // with its own 16×16 fill viewBox (the stroke-based icon() helper can't render
    // a fill icon).
    const DISCO_ICON =
      '<svg class="ic" viewBox="0 0 16 16" fill="currentColor" aria-hidden="true"><path d="M10.706 3.294A12.6 12.6 0 0 0 8 3C5.259 3 2.723 3.882.663 5.379a.485.485 0 0 0-.048.736.52.52 0 0 0 .668.05A11.45 11.45 0 0 1 8 4q.946 0 1.852.148zM8 6c-1.905 0-3.68.56-5.166 1.526a.48.48 0 0 0-.063.745.525.525 0 0 0 .652.065 8.45 8.45 0 0 1 3.51-1.27zm2.596 1.404.785-.785q.947.362 1.785.907a.482.482 0 0 1 .063.745.525.525 0 0 1-.652.065 8.5 8.5 0 0 0-1.98-.932zM8 10l.933-.933a6.5 6.5 0 0 1 2.013.637c.285.145.326.524.1.75l-.015.015a.53.53 0 0 1-.611.09A5.5 5.5 0 0 0 8 10m4.905-4.905.747-.747q.886.451 1.685 1.03a.485.485 0 0 1 .047.737.52.52 0 0 1-.668.05 11.5 11.5 0 0 0-1.811-1.07M9.02 11.78c.238.14.236.464.04.66l-.707.706a.5.5 0 0 1-.707 0l-.707-.707c-.195-.195-.197-.518.04-.66A2 2 0 0 1 8 11.5c.374 0 .723.102 1.021.28zm4.355-9.905a.53.53 0 0 1 .75.75l-10.75 10.75a.53.53 0 0 1-.75-.75z"/></svg>';

    /* ── Surface definitions ──────────────────────────────────────────────
       Each surface loads the LIVE app at its injected URL. The lazy `src`
       (assigned on first open) keeps each iframe from loading until the user
       actually visits that surface. */
    const SURFACES = {
      config: {
        icon: "sliders", label: "Config",
        desc: "Configure every agent, AI service and plugin — controls generated straight from the live settings schema.",
        stats: ["services", "agents", "schema-driven"],
        src: URLS.config,
        // Config is launched by the dashboard, so it's normally up even before a
        // runtime exists — its message just says the service itself is down.
        note: "The configuration service isn't running. Start the console (or <code>config:web</code>), then Retry.",
      },
      chat: {
        icon: "chat", label: "Chat",
        desc: "Talk to your agents from the browser — roster, presence and a live transcript out of the box.",
        stats: ["agents", "online", "browser chat"],
        src: URLS.chat,
        note: "Chat isn't running. Start a Krakey agent with <code>krakey start</code>, then Retry.",
      },
      inspector: {
        icon: "activity", label: "Inspector",
        desc: "Watch every frame as it happens — prompts, the event stream, tool dispatch and gather/compose lanes.",
        stats: ["live", "events", "read-only"],
        src: URLS.inspector,
        note: "Inspector isn't running. Start a Krakey agent with <code>krakey start</code>, then Retry.",
      },
    };

    /* ── Reachability — polled from the console SERVER (same-origin) ───────
       The console's Node server checks each surface with a REAL fetch and reports
       booleans at GET /api/status. We poll that same-origin endpoint on load and
       on a timer. Why not probe the surfaces directly from here? A browser
       cross-origin `no-cors` fetch can't read the response, so it RESOLVES for a
       half-open socket too — making a STOPPED surface look "online". The
       server-side check reads the real connection (a dead port refuses), and the
       timer keeps the dots current instead of a one-shot snapshot. */
    const PROBE_TIMEOUT_MS = 3000;
    const POLL_MS = 5000;
    const reachable = { config: null, chat: null, inspector: null }; // null=unknown, true/false=last poll

    async function fetchStatus() {
      try {
        const signal = AbortSignal.timeout ? AbortSignal.timeout(PROBE_TIMEOUT_MS) : undefined;
        const r = await fetch("/api/status", { signal, cache: "no-store" });
        const s = await r.json();
        for (const k of ["config", "chat", "inspector"]) reachable[k] = !!s[k];
      } catch {
        // The poll itself failed → the console SERVER is unreachable (e.g. it was
        // stopped by `krakey stop`, which reaps the dashboard too). We can't confirm
        // ANY surface is up, so mark them all offline rather than freezing on a
        // stale "online" — showing "online" for something we can't reach is exactly
        // the false-positive to avoid. (A later poll flips them back once it answers.)
        for (const k of ["config", "chat", "inspector"]) reachable[k] = false;
      }
      paintConsoleStatus();
      for (const k of ["config", "chat", "inspector"]) paintCardStatus(k, reachable[k]);
      return reachable;
    }

    // probe(key) keeps its old contract (returns this surface's reachability) so
    // the surface-open / Retry flows are unchanged — it just refreshes via the poll.
    async function probe(key) {
      await fetchStatus();
      return reachable[key];
    }

    /* ── Build the persistent shell ───────────────────────────────────────
       A horizontal TOP nav-bar (brand · tabs · status) followed by the
       full-width content area. No left sidebar — so an embedded surface's own
       sidebar is the only one on screen. */
    const app = el("div", "app");
    app.innerHTML = `
      <nav class="topnav">
        <div class="brand">
          <span class="brand-mark">${icon("stars")}</span>
          <div>
            <div class="mark">KRAKEY <span class="b">Console</span></div>
            <div class="tag">ultimate autonomous agent</div>
          </div>
        </div>
        <div class="nav">
          <button data-nav="dashboard"><span class="ico">${icon("grid")}</span> Dashboard</button>
          <button data-nav="config"><span class="ico">${icon("sliders")}</span> Config</button>
          <button data-nav="chat"><span class="ico">${icon("chat")}</span> Chat</button>
          <button data-nav="inspector"><span class="ico">${icon("activity")}</span> Inspector <span class="count">live</span></button>
        </div>
        <div class="foot">
          <div class="status"><span class="dot"></span> <span id="cstatus-text">checking…</span></div>
        </div>
      </nav>
      <main class="main" id="main"></main>`;
    document.body.appendChild(app);

    const main = $("#main", app);

    /* ── Dashboard view ───────────────────────────────────────────────────*/
    function renderDashboard() {
      main.className = "main is-dashboard view-enter";
      main.innerHTML = "";

      // hero
      const hero = el("div", "hero");
      hero.innerHTML =
        `<div class="he-left">` +
          `<div class="he-mark">${icon("stars")}<span>KRAKEY CONSOLE</span></div>` +
          `<h1>One cockpit for your <span class="accent">autonomous agents</span>.</h1>` +
          `<p class="lede">Configure, converse with, and observe every Krakey agent from a single shell. Pick a surface below — or use the nav up top at any time.</p>` +
          `<div class="he-strip">` +
            statEl("sliders", "Config", "settings & onboarding") +
            statEl("chat", "Chat", "browser chat") +
            statEl("activity", "Inspector", "live frames") +
          `</div>` +
        `</div>` +
        `<button class="he-cta-btn" data-quick-setup>` +
          `<span class="lab">${icon("stars")} Quick setup</span>` +
          `<span class="sub">Connect an AI service and create your first agent — right in your browser.</span>` +
          `<span class="tiny">~2 min · no install</span>` +
        `</button>`;
      main.appendChild(hero);

      // wire the hero's "Quick setup" → open Config at the wizard deep-link
      const quickBtn = hero.querySelector("[data-quick-setup]");
      if (quickBtn) quickBtn.onclick = quickSetup;

      // surface cards — each shows a per-surface connected/not-connected dot
      main.appendChild(el("div", "group-label", "Open a service"));
      const grid = el("div", "grid cols-3 stagger");
      for (const key of ["config", "chat", "inspector"]) {
        const s = SURFACES[key];
        const card = el("div", "card click surface-card");
        card.innerHTML =
          `<div class="ch"><span class="g">${icon(s.icon)}</span><h3>${s.label}</h3>${statusBadge(key)}</div>` +
          `<p class="desc">${s.desc}</p>` +
          `<div class="meta">${s.stats.map((m, i) => `<span class="pill${i === 0 ? " mint" : ""}">${m}</span>`).join("")}</div>` +
          `<div class="open-row">Open ${s.label} ${icon("arrowRight")}</div>`;
        card.dataset.card = key;
        card.onclick = () => openSurface(key);
        grid.appendChild(card);
      }
      main.appendChild(grid);

      // probe each surface so the dashboard cards reflect live status at a glance
      probeAllCards();

      // recent activity strip
      main.appendChild(el("div", "group-label", "Getting started"));
      const acts = [
        ["sliders", `Open <b>Config</b> to set up your AI services and agents`, "config", "start here"],
        ["chat", `Open <b>Chat</b> to talk to your agents from the browser`, "chat", "needs a running agent"],
        ["activity", `Open <b>Inspector</b> to watch frames live`, "inspector", "needs a running agent"],
        ["server", `Services run separately — see the console README`, "console", "docs"],
      ];
      const list = el("div", "activity stagger");
      for (const [ic, text, src, when] of acts) {
        const row = el("div", "act-row");
        row.innerHTML =
          `<span class="g">${icon(ic)}</span>` +
          `<span class="at">${text} <span class="src">· ${src}</span></span>` +
          `<span class="when">${when}</span>`;
        list.appendChild(row);
      }
      main.appendChild(list);

      setActiveNav("dashboard");
      main.scrollTop = 0;
    }

    function statEl(ic, n, l) {
      return `<div class="he-stat"><span class="g">${icon(ic)}</span><span class="n">${n}</span><span class="l">${l}</span></div>`;
    }

    /* A small connected/not-connected badge for a dashboard surface card. The
       dot starts in its last-known state (or "probing" if we've never checked)
       and probeAllCards() flips it once each probe resolves. */
    function statusBadge(key) {
      const r = reachable[key];
      const cls = r === true ? "up" : r === false ? "down" : "probing";
      const lbl = r === true ? "connected" : r === false ? "offline" : "checking";
      const lblCls = r === true ? " up" : "";
      return `<span class="st${lblCls}" data-st="${key}"><span class="sdot ${cls}"></span>${lbl}</span>`;
    }

    /* Refresh every surface card badge — one poll updates all three + the top bar. */
    function probeAllCards() {
      for (const key of ["config", "chat", "inspector"]) paintCardStatus(key, reachable[key]);
      fetchStatus();
    }

    function paintCardStatus(key, up) {
      const badge = main.querySelector(`.st[data-st="${key}"]`);
      if (!badge) return; // dashboard not mounted (we're in a surface view)
      const cls = up === true ? "up" : up === false ? "down" : "probing";
      const lbl = up === true ? "connected" : up === false ? "offline" : "checking";
      badge.classList.toggle("up", up === true);
      badge.innerHTML = `<span class="sdot ${cls}"></span>${lbl}`;
    }

    /* Reflect the live services' aggregate reachability in the top-bar status.
       The console page only loads when the console itself is up, so the only
       meaningful, VARIABLE signal is how many of the three services answer. */
    function paintConsoleStatus() {
      const dot = $(".topnav .foot .status .dot", app);
      const txt = $("#cstatus-text", app);
      if (!dot || !txt) return;
      const vals = ["config", "chat", "inspector"].map((k) => reachable[k]);
      const up = vals.filter((v) => v === true).length;
      const known = vals.filter((v) => v !== null).length;
      let cls = "", label;
      if (known === 0) label = "checking…";
      else if (up === 3) { cls = "up"; label = "all services online"; }
      else if (up === 0) { cls = "down"; label = "services offline"; }
      else { cls = "partial"; label = up + "/3 services"; }
      dot.className = "dot" + (cls ? " " + cls : "");
      txt.textContent = label;
    }

    /* ── Surface view (reachable → kept-alive iframe; down → "Not connected") ─
       Each surface host holds BOTH an iframe and a "Not connected" panel; we
       show whichever the latest probe warrants. Iframes are kept ALIVE across
       switches (built once, loaded once) so a reachable surface keeps its state
       when you tab away and back; a down surface shows its panel until Retry
       finds the server up, at which point we swap to the iframe. */
    const surfaceHosts = {}; // key -> built surface element

    function buildSurface(key) {
      const s = SURFACES[key];
      const host = el("div", "surface");
      host.dataset.surface = key;

      const frame = el("iframe", "surf-frame");
      frame.title = s.label + " service";
      frame.style.display = "none"; // hidden until a probe says the server is up
      frame.dataset.src = s.src; // lazy — real src set once reachable
      host.appendChild(frame);

      main.appendChild(host);
      surfaceHosts[key] = host;
      return host;
    }

    /* Show the live iframe for a reachable surface (loading it lazily once). */
    function showFrame(host) {
      const frame = host.querySelector("iframe");
      const disco = host.querySelector(".disco");
      if (disco) disco.remove();
      if (frame) {
        if (!frame.src && frame.dataset.src) frame.src = frame.dataset.src;
        frame.style.display = "block";
      }
    }

    /* Render (or refresh) the branded "Not connected" panel for a down surface. */
    function showDisco(host, key) {
      const s = SURFACES[key];
      const frame = host.querySelector("iframe");
      if (frame) frame.style.display = "none";
      let disco = host.querySelector(".disco");
      if (!disco) {
        disco = el("div", "disco");
        host.appendChild(disco);
      }
      disco.innerHTML =
        `<div class="box view-enter">` +
          `<div class="disc">${DISCO_ICON}</div>` +
          `<h3>${s.label} <span class="nm">isn't connected</span></h3>` +
          `<p>${s.note}</p>` +
          `<div class="actions">` +
            `<button class="btn primary" data-retry="${key}">${icon("refresh", "btn-ic")} Retry</button>` +
          `</div>` +
        `</div>`;
      const btn = disco.querySelector("[data-retry]");
      btn.onclick = () => retrySurface(key);
    }

    /* Probe a surface and render the iframe or the panel based on the result. */
    function renderSurface(key) {
      const host = surfaceHosts[key];
      if (!host) return;
      // Already known reachable (e.g. loaded earlier this session) → keep the frame.
      if (reachable[key] === true) { showFrame(host); return; }
      // Otherwise (unknown OR last-known-down) probe, showing the panel meanwhile.
      showDisco(host, key);
      probe(key).then((up) => {
        // only the still-active surface should swap (user may have navigated away)
        if (up) showFrame(host);
        else showDisco(host, key);
      });
    }

    /* Retry button: re-probe and swap to the iframe if the server is now up. */
    function retrySurface(key) {
      const host = surfaceHosts[key];
      if (!host) return;
      const btn = host.querySelector("[data-retry]");
      if (btn) {
        btn.classList.add("retrying");
        btn.innerHTML = `${icon("refresh", "btn-ic spin")} Retrying…`;
      }
      probe(key).then((up) => {
        if (up) showFrame(host);
        else showDisco(host, key); // resets the button label
      });
    }

    function openSurface(key) {
      // Switching away from the dashboard: clear it and mount the surface hosts
      // once. We rebuild the host set each time we LEAVE the dashboard, since the
      // dashboard render clears main.innerHTML.
      if (!main.classList.contains("is-surface")) {
        main.className = "main is-surface view-enter";
        main.innerHTML = "";
        for (const k in surfaceHosts) delete surfaceHosts[k];
        buildSurface("config");
        buildSurface("chat");
        buildSurface("inspector");
      }

      // activate the chosen surface, hide the rest
      for (const k in surfaceHosts) surfaceHosts[k].classList.toggle("active", k === key);

      // lazily probe + render the chosen surface (iframe if up, panel if down)
      renderSurface(key);

      setActiveNav(key);
    }

    /* ── Quick setup (first-run) ──────────────────────────────────────────
       The Dashboard hero's primary action: jump straight into config-web's
       Guided-setup wizard. We open the Config surface and point its iframe at
       the wizard DEEP-LINK (URLS.config + "#wizard") — config-web's boot()
       honours that hash and opens the wizard instead of the overview. The hash
       must go AFTER any existing `?token=…` query and must not duplicate a hash
       that's already there. We respect the reachability flow: if Config is down
       the existing "Not connected" panel still shows; we only force the wizard
       src once the surface is reachable. */
    function withWizardHash(url) {
      // strip any existing fragment, then append the wizard anchor — this keeps
      // the `?token=…` query intact and never yields a double "#".
      return String(url).replace(/#.*$/, "") + "#wizard";
    }

    function quickSetup() {
      // Mount/activate the Config surface (nav active = config, panel/iframe up).
      openSurface("config");
      const host = surfaceHosts.config;
      if (!host) return;
      const wizardSrc = withWizardHash(SURFACES.config.src);
      const point = () => {
        const frame = host.querySelector("iframe");
        if (frame && frame.src !== wizardSrc) frame.src = wizardSrc; // (re)load into the wizard
      };
      // If Config is already known reachable, openSurface() showed the frame —
      // point it at the wizard now. Otherwise wait for the probe: only deep-link
      // once it's up; if it's down the "Not connected" panel stays as-is.
      if (reachable.config === true) point();
      else probe("config").then((up) => { if (up) point(); });
    }

    function setActiveNav(key) {
      app.querySelectorAll(".nav button").forEach((b) => b.classList.toggle("active", b.dataset.nav === key));
    }

    /* ── Wire the persistent nav ──────────────────────────────────────────*/
    app.querySelectorAll(".nav button").forEach((b) => {
      b.onclick = () => (b.dataset.nav === "dashboard" ? renderDashboard() : openSurface(b.dataset.nav));
    });

    // initial view
    renderDashboard();
    // Keep the online dots current: poll the server-side status on a timer (not a
    // one-shot snapshot), so a surface going up/down is reflected within POLL_MS.
    fetchStatus();
    setInterval(fetchStatus, POLL_MS);
    // expose for the preview harness / debugging
    window.__krakeyConsole = { renderDashboard, openSurface, quickSetup, retrySurface, probe, fetchStatus, reachable, SURFACES, URLS };
  })();
  </script>
</body>
</html>
