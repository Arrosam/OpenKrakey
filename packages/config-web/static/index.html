<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OpenKrakey · Config Console</title>
  <meta name="description" content="Schema-driven config management console + onboarding wizard for OpenKrakey. Reads/writes the same config files the cli edits." />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <!-- shell + views are built by app.js; the schema is fetched from /api/schema -->
  <script>window.__loadErrors = []; window.addEventListener('error', function (e) { window.__loadErrors.push((e.message || '') + ' @ ' + (e.filename || '').split('/').pop() + ':' + e.lineno); });</script>
  <script src="app.js"></script>
</body>
</html>
