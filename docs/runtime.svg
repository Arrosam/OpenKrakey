<svg viewBox="0 0 900 766" xmlns="http://www.w3.org/2000/svg" role="img" font-family="var(--font-sans, ui-sans-serif, system-ui, sans-serif)">
<title>Krakey runtime — one frame, and the startup that wires it</title>
<desc>All ten core modules. Global, one per process: boot starts an Agent per config file; cli, config-web and console configure and observe out-of-band; llm-gateway holds the keys and emits key-less communicators. Per Agent, wrapped by agent_instance: the loader installs and registers plugins at startup (dashed wiring), building each PluginContext with the key-less llm; then the frame loop runs (solid, numbered) — clock.tick, the orchestrator emits prompt.gather, composes the prompt, emits a non-blocking llm.request, llm-core returns tool calls via llm.return, the orchestrator dispatches them on the actionbus, and plugins fold tool.result back and may call clock.fire_now. Everything flows through the central event-system bus.</desc>
<style>
  .ttl{font-size:20px;font-weight:700;fill:var(--text-primary,#2C2C2A);}
  .leg{font-size:12px;font-weight:600;}
  .bn{font-size:11px;font-weight:700;fill:var(--text-muted,#888780);letter-spacing:.03em;}
  .bt{font-size:15px;font-weight:700;fill:var(--text-primary,#2C2C2A);}
  .bts{font-size:13px;font-weight:700;fill:var(--text-primary,#2C2C2A);}
  .bs{font-size:11px;fill:var(--text-secondary,#5F5E5A);}
  .el{font-size:11.5px;font-family:var(--font-mono,ui-monospace,monospace);fill:var(--text-secondary,#5F5E5A);}
  .note{font-size:11px;fill:var(--text-muted,#888780);}
  .badge{font-size:11px;font-weight:700;fill:#ffffff;}
  .box{fill:var(--surface-2,#ffffff);stroke:var(--border-strong,#B4B2A9);stroke-width:1.4;}
  .flow{fill:none;stroke-width:1.8;}
  .wire{fill:none;stroke-width:1.5;stroke-dasharray:5 4;}
  .purple{stroke:#7F77DD;} .teal{stroke:#1D9E75;} .orange{stroke:#D85A30;} .gray{stroke:var(--border-strong,#9b9a93);}
</style>
<defs>
  <marker id="ah" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
    <path d="M0,0 L10,5 L0,10 z" fill="context-stroke"/>
  </marker>
</defs>

<rect x="0" y="0" width="900" height="766" fill="#FBFBF9"/>

<text x="450" y="26" text-anchor="middle" class="ttl">Krakey runtime — one frame (event-driven · non-blocking)</text>
<text x="450" y="46" text-anchor="middle" class="leg"><tspan fill="#7F77DD">■ kernel module</tspan><tspan fill="#888780">  ·  </tspan><tspan fill="#1D9E75">■ plugin</tspan><tspan fill="#888780">  ·  </tspan><tspan fill="#D85A30">■ gateway / keys</tspan><tspan fill="#888780">  ·  solid = per-frame · dashed = startup wiring</tspan></text>

<!-- GLOBAL band -->
<rect x="20" y="60" width="860" height="98" rx="12" fill="var(--surface-1,#FBFBF9)" stroke="var(--border,#D3D1C7)" stroke-width="1.3"/>
<text x="34" y="80" class="bn">GLOBAL · ONE PER PROCESS</text>
<rect x="34" y="88" width="150" height="60" rx="8" class="box" stroke="#7F77DD"/><rect x="34" y="88" width="5" height="60" rx="2.5" fill="#7F77DD"/><text x="48" y="111" class="bts">boot</text><text x="48" y="129" class="bs">starts an Agent</text><text x="48" y="143" class="bs">per config file</text>
<text x="300" y="80" class="bn" fill="#888780">CONFIGURE &amp; OBSERVE — OUT-OF-BAND</text>
<rect x="300" y="88" width="108" height="60" rx="8" class="box" stroke="#7F77DD" stroke-dasharray="4 3"/><text x="313" y="111" class="bts">cli</text><text x="313" y="129" class="bs">arrow-key</text><text x="313" y="143" class="bs">config editor</text>
<rect x="416" y="88" width="132" height="60" rx="8" class="box" stroke="#7F77DD" stroke-dasharray="4 3"/><text x="429" y="111" class="bts">config-web</text><text x="429" y="129" class="bs">config UI +</text><text x="429" y="143" class="bs">onboarding wizard</text>
<rect x="556" y="88" width="124" height="60" rx="8" class="box" stroke="#7F77DD" stroke-dasharray="4 3"/><text x="569" y="111" class="bts">console</text><text x="569" y="129" class="bs">unified web</text><text x="569" y="143" class="bs">shell</text>
<rect x="700" y="88" width="166" height="60" rx="8" class="box" stroke="#D85A30"/><rect x="700" y="88" width="5" height="60" rx="2.5" fill="#D85A30"/><text x="714" y="111" class="bts">llm-gateway</text><text x="714" y="129" class="bs">keys in →</text><text x="714" y="143" class="bs">key-less out</text>

<!-- agent container = agent_instance -->
<rect x="20" y="182" width="860" height="562" rx="16" fill="var(--surface-1,#FBFBF9)" stroke="var(--border,#D3D1C7)" stroke-width="1.4" stroke-dasharray="3 4"/>
<text x="40" y="208" class="bs" font-weight="700">agent_instance — wraps one Agent (façade) · ×N run concurrently, mutually isolated (R6)</text>

<!-- clock -->
<rect x="62" y="234" width="150" height="58" rx="9" class="box"/><rect x="62" y="234" width="5" height="58" rx="2.5" fill="#7F77DD"/><text x="78" y="259" class="bt">clock</text><text x="78" y="277" class="bs">dumb countdown timer</text>

<!-- orchestrator -->
<rect x="290" y="228" width="244" height="74" rx="9" class="box"/><rect x="290" y="228" width="5" height="74" rx="2.5" fill="#7F77DD"/><text x="306" y="253" class="bt">orchestrator</text><text x="306" y="271" class="bs">conductor — composes context</text><text x="306" y="287" class="bs">holds the context-buffer</text>
<circle cx="512" cy="252" r="11" fill="#534AB7"/><text x="512" y="256" text-anchor="middle" class="badge">3</text>

<!-- loader (startup) -->
<rect x="610" y="234" width="236" height="58" rx="9" class="box" stroke="#7F77DD" stroke-dasharray="5 4"/><rect x="610" y="234" width="5" height="58" rx="2.5" fill="#7F77DD"/><text x="626" y="259" class="bt">loader</text><text x="626" y="277" class="bs">installs + registers plugins (start · stop)</text>

<!-- bus -->
<rect x="124" y="392" width="632" height="56" rx="12" fill="var(--surface-2,#ffffff)" stroke="#7F77DD" stroke-width="2.2"/>
<text x="440" y="414" text-anchor="middle" class="bt" fill="#534AB7">EVENT-SYSTEM</text>
<text x="440" y="432" text-anchor="middle" class="bs">eventbus (emit · on)  +  actionbus (register · invoke) — the only channel between parts (R2)</text>

<!-- llm-core -->
<rect x="110" y="524" width="222" height="78" rx="9" class="box"/><rect x="110" y="524" width="5" height="78" rx="2.5" fill="#D85A30"/><text x="126" y="550" class="bt">llm-core <tspan class="bs">(plugin)</tspan></text><text x="126" y="568" class="bs">does the round-trip,</text><text x="126" y="584" class="bs">parses tool calls out</text>

<!-- plugins -->
<rect x="470" y="512" width="376" height="150" rx="9" class="box"/><rect x="470" y="512" width="5" height="150" rx="2.5" fill="#1D9E75"/>
<text x="486" y="536" class="bt">plugins <tspan class="bs">— contribute blocks · actions · listeners</tspan></text>
<text x="486" y="560" class="el">tool-manager · persona · system-prompt</text>
<text x="486" y="578" class="el">web-chat · krakeycode · web-search · browser</text>
<text x="486" y="596" class="el">memory-note · history · inspector</text>
<text x="486" y="614" class="el">interval_toggle · restart</text>
<text x="486" y="636" class="note">each isolated; talks only via the bus</text>
<text x="486" y="652" class="note">+ any plugin you write (private overrides public)</text>

<!-- ===== STARTUP WIRING (dashed) ===== -->
<path d="M 109 148 L 109 182" class="wire gray" marker-end="url(#ah)"/><text x="116" y="170" class="note">creates</text>
<path d="M 783 148 L 783 232" class="wire orange" marker-end="url(#ah)"/><text x="766" y="190" text-anchor="middle" class="note" transform="rotate(-90 766 190)">key-less llm</text>
<path d="M 655 292 L 655 390" class="wire gray" marker-end="url(#ah)"/><text x="668" y="330" class="note">register on bus</text>
<path d="M 822 292 L 822 508" class="wire gray" marker-end="url(#ah)"/><text x="838" y="400" text-anchor="middle" class="note" transform="rotate(90 838 400)">build PluginContext · setup()</text>

<!-- ===== PER-FRAME FLOW (solid, 1–7) ===== -->
<!-- 1 clock -> bus -->
<line x1="137" y1="292" x2="137" y2="390" class="flow purple" marker-end="url(#ah)"/>
<circle cx="137" cy="343" r="11" fill="#534AB7"/><text x="137" y="347" text-anchor="middle" class="badge">1</text>
<text x="152" y="347" class="el">clock.tick</text>

<!-- 2 orch gather -->
<line x1="378" y1="302" x2="378" y2="390" class="flow purple" marker-end="url(#ah)"/>
<circle cx="378" cy="343" r="11" fill="#534AB7"/><text x="378" y="347" text-anchor="middle" class="badge">2</text>
<text x="362" y="347" text-anchor="end" class="el">prompt.gather →</text>

<!-- 4 orch request -->
<line x1="450" y1="302" x2="450" y2="390" class="flow purple" marker-end="url(#ah)"/>
<circle cx="450" cy="343" r="11" fill="#534AB7"/><text x="450" y="347" text-anchor="middle" class="badge">4</text>
<text x="464" y="339" class="el">llm.request</text>
<text x="464" y="354" class="note">frame ends · non-blocking</text>

<!-- 5 bus -> llm-core -->
<line x1="218" y1="448" x2="218" y2="522" class="flow orange" marker-end="url(#ah)"/>
<circle cx="218" cy="485" r="11" fill="#D85A30"/><text x="218" y="489" text-anchor="middle" class="badge">5</text>
<text x="204" y="489" text-anchor="end" class="el">handles</text>

<!-- llm-core -> bus -->
<line x1="272" y1="522" x2="272" y2="448" class="flow orange" marker-end="url(#ah)"/>
<text x="286" y="489" class="el">llm.return (+toolCalls)</text>

<!-- 6 bus -> plugins (dispatch) -->
<line x1="690" y1="448" x2="690" y2="510" class="flow teal" marker-end="url(#ah)"/>
<!-- 7 plugins -> bus (result) -->
<line x1="740" y1="510" x2="740" y2="448" class="flow teal" marker-end="url(#ah)"/>
<!-- labels stacked clear of the arrows -->
<circle cx="496" cy="470" r="11" fill="#1D9E75"/><text x="496" y="474" text-anchor="middle" class="badge">6</text>
<text x="513" y="474" class="el">dispatch toolCall</text>
<circle cx="496" cy="494" r="11" fill="#1D9E75"/><text x="496" y="498" text-anchor="middle" class="badge">7</text>
<text x="513" y="498" class="el">tool.result · fire_now</text>

<!-- bottom callouts -->
<text x="40" y="690" class="note"><tspan font-weight="700">3  compose:</tspan> blocks → system prompt (priority DESC, &lt;label&gt;-wrapped) + messages array, split by each block's target</text>
<text x="40" y="706" class="note"><tspan font-weight="700">context.full:</tspan> prompt over budget → message-block plugins shed oldest entries → re-compose · a channel's input.message also calls clock.fire_now</text>
<text x="40" y="726" class="note"><tspan font-weight="700">Lifecycle:</tspan> boot → agent_instance wires clock/event-system/orchestrator/loader → loader sets up plugins → then frames run (1–7) until stop tears them down.</text>
</svg>
